<!DOCTYPE html>

<title>5 Days in the Jungle</title>
<style>

<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════════════════════════════════════
//  5 DAYS IN THE JUNGLE  ·  HTML5 Canvas  ·  theadubs.github.io
//  Vietnam Era Survival Shooter  ·  Survive 5 days and 5 nights
// ═══════════════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Crisp rendering on HiDPI / Retina ──────────────────────────────────
const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W = 0, H = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); });

// ═══════════════════════════════════════════════════════════════════════
//  CONFIG  — all tunable numbers live here
// ═══════════════════════════════════════════════════════════════════════
const CFG = {
  HUD_H: 108,           // px reserved for bottom HUD

  // Lane Y positions as fraction of game-area height (far → near)
  LANES: [0.40, 0.55, 0.70],

  // Base move speed per enemy type (px / sec at diff×1)
  SPEED:    { scout:110, soldier:72, sniper:42, heavy:36, commander:50 },
  // Base HP
  HP:       { scout:40,  soldier:80, sniper:50, heavy:220,commander:500 },
  // Damage per hit
  DMG:      { scout:7,   soldier:10, sniper:28, heavy:18, commander:14 },
  // Seconds between attacks — generously spaced so Day 1 feels fair
  ATK_INT:  { scout:3.5, soldier:3.0,sniper:5.5,heavy:4.0,commander:2.0 },

  // Difficulty multiplier per day (HP, damage, speed scale)
  DIFF: [1.0, 1.45, 1.9, 2.5, 3.2],

  // Player
  SHOOT_RADIUS: 38,     // tap hit tolerance (CSS px)
  BULLET_DMG:   25,
  MAX_HP:       100,
  MAX_AMMO:     30,
  AMMO_RESERVE: 90,
  MAX_GRENADES: 2,
  GRENADE_DMG:  90,
  GRENADE_RADIUS: 160,

  // Night
  SANITY_DRAIN: 3,      // sanity points/sec drained at night
  TORCH_BASE:   290,    // torch radius at full sanity
  TORCH_MIN:    130,    // torch radius at zero sanity

  // Wave pacing
  REST_DURATION:  4.0,  // sec rest between waves
  SPAWN_BASE:     2.5,  // sec between enemy spawns (base)
};

// ═══════════════════════════════════════════════════════════════════════
//  AUDIO  — Web Audio API synth, no external files needed
//  All sounds are procedurally generated with oscillators + noise.
//  AudioContext is created on first user interaction (browser policy).
// ═══════════════════════════════════════════════════════════════════════
let AC = null;   // AudioContext — lazy init

function getAC() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  // Resume if suspended (mobile autoplay policy)
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

// ── Low-level helpers ──────────────────────────────────────────────────

// White noise buffer (1 sec, reused)
let _noiseBuf = null;
function noiseBuf() {
  if (_noiseBuf) return _noiseBuf;
  const ac   = getAC();
  const len  = ac.sampleRate;
  _noiseBuf  = ac.createBuffer(1, len, ac.sampleRate);
  const data = _noiseBuf.getChannelData(0);
  for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
  return _noiseBuf;
}

// Play a tone via oscillator
function playTone(freq, type, gainPeak, attackT, decayT, startFreq) {
  const ac  = getAC();
  const osc = ac.createOscillator();
  const env = ac.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(startFreq || freq, ac.currentTime);
  if (startFreq) osc.frequency.exponentialRampToValueAtTime(freq, ac.currentTime + attackT);
  env.gain.setValueAtTime(0, ac.currentTime);
  env.gain.linearRampToValueAtTime(gainPeak, ac.currentTime + attackT);
  env.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + attackT + decayT);
  osc.connect(env); env.connect(ac.destination);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + attackT + decayT + 0.05);
}

// Play filtered noise burst
function playNoise(gainPeak, attackT, decayT, filterFreq, filterQ) {
  const ac  = getAC();
  const src = ac.createBufferSource();
  src.buffer = noiseBuf();
  src.loop   = true;
  const flt  = ac.createBiquadFilter();
  flt.type   = 'bandpass';
  flt.frequency.value = filterFreq;
  flt.Q.value = filterQ;
  const env  = ac.createGain();
  env.gain.setValueAtTime(0, ac.currentTime);
  env.gain.linearRampToValueAtTime(gainPeak, ac.currentTime + attackT);
  env.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + attackT + decayT);
  src.connect(flt); flt.connect(env); env.connect(ac.destination);
  src.start(ac.currentTime);
  src.stop(ac.currentTime + attackT + decayT + 0.05);
}

// ── Named sound effects ───────────────────────────────────────────────

const SFX = {
  // Player gunshot — sharp crack + noise tail
  shoot() {
    playNoise(0.9, 0.002, 0.08, 2800, 0.8);    // crack
    playTone(120, 'sawtooth', 0.3, 0.003, 0.12, 180); // body thud
  },

  // Enemy bullet impact / near-miss whistle
  enemyFire() {
    playTone(1200, 'sine', 0.08, 0.002, 0.06, 1800); // whistle
    playNoise(0.25, 0.001, 0.06, 1800, 1.2);
  },

  // Player taking a hit
  playerHit() {
    playNoise(0.6, 0.001, 0.18, 400, 0.5);
    playTone(90, 'sawtooth', 0.4, 0.002, 0.22, 130);
  },

  // Enemy death thud
  enemyDie() {
    playTone(180, 'sawtooth', 0.35, 0.005, 0.18, 260);
    playNoise(0.3, 0.002, 0.12, 300, 0.6);
  },

  // Grenade launch click
  grenadeThrow() {
    playTone(600, 'square', 0.2, 0.003, 0.06);
    playNoise(0.15, 0.002, 0.05, 900, 2);
  },

  // Grenade explosion — deep boom + rumble
  grenadeExplode() {
    playNoise(1.2, 0.005, 0.35, 180, 0.4);      // boom body
    playNoise(0.6, 0.002, 0.55, 60,  0.3);       // low rumble
    playTone(55,  'sawtooth', 0.5, 0.004, 0.4, 80); // sub thud
  },

  // Reload click-clack
  reload() {
    playTone(900, 'square', 0.15, 0.003, 0.04);
    setTimeout(() => playTone(700, 'square', 0.12, 0.003, 0.04), 80);
    setTimeout(() => playNoise(0.2, 0.002, 0.06, 1200, 3), 140);
  },

  // Out of ammo dry click
  emptyClick() {
    playTone(1100, 'square', 0.1, 0.002, 0.03);
  },

  // Wave clear chime — two rising tones
  waveClear() {
    playTone(660, 'sine', 0.22, 0.01, 0.22);
    setTimeout(() => playTone(880, 'sine', 0.18, 0.01, 0.3), 160);
  },

  // Pickup collect pop
  pickup() {
    playTone(1320, 'sine', 0.18, 0.005, 0.12, 880);
  },

  // Day/night transition drone
  phaseChange() {
    playTone(110, 'sine', 0.25, 0.08, 0.6);
    playTone(165, 'sine', 0.12, 0.10, 0.5);
  },

  // Victory fanfare
  victory() {
    [0, 160, 320, 500].forEach((t, i) => {
      const freqs = [523, 659, 784, 1047];
      setTimeout(() => playTone(freqs[i], 'sine', 0.28, 0.02, 0.35), t);
    });
  },

  // Game over sting
  gameOver() {
    playTone(330, 'sawtooth', 0.3, 0.02, 0.3);
    setTimeout(() => playTone(220, 'sawtooth', 0.3, 0.02, 0.5), 280);
    setTimeout(() => playTone(110, 'sawtooth', 0.3, 0.02, 0.8), 560);
  },
};

// ═══════════════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════════════
let G = {};   // global game state — reset() rebuilds it fully

function reset() {
  G = {
    screen: 'menu',        // 'menu' | 'playing' | 'gameover' | 'victory'
    day:    1,             // 1–5
    phase:  'day',         // 'day' | 'night'
    wave:   1,             // wave number within this phase
    totalWaves: 3,         // waves per phase

    hp:          CFG.MAX_HP,
    ammo:        CFG.MAX_AMMO,
    ammoReserve: CFG.AMMO_RESERVE,
    grenades:    CFG.MAX_GRENADES,
    sanity:      100,
    kills:       0,
    score:       0,

    enemies:      [],
    drops:        [],
    particles:    [],
    dmgNums:      [],
    eBullets:     [],     // enemy projectiles

    // Wave manager
    spawnQueue:   [],
    spawnTimer:   0,
    spawnInterval:CFG.SPAWN_BASE,
    inRest:       false,
    restTimer:    0,

    // Input
    crossX: -1, crossY: -1,
    touching: false,

    // Feedback
    hitFlash: 0,          // countdown timer for red flash on taking damage

    lastTime: 0,
  };
}
reset();

function gameH()  { return H - CFG.HUD_H; }
function diff()   { return CFG.DIFF[G.day - 1]; }
function laneY(i) { return CFG.LANES[i] * gameH(); }

// ═══════════════════════════════════════════════════════════════════════
//  ENEMY
// ═══════════════════════════════════════════════════════════════════════
class Enemy {
  constructor(type, lane) {
    this.type  = type;
    this.lane  = lane;
    this.x     = W + 60;
    this.y     = laneY(lane);

    // Far lanes appear smaller (depth illusion)
    this.scale = [0.52, 0.76, 1.0][lane];

    const d     = diff();
    this.maxHp  = Math.round(CFG.HP[type] * d);
    this.hp     = this.maxHp;
    this.speed  = CFG.SPEED[type] * Math.sqrt(d);   // sqrt keeps speed sane
    this.dmg    = CFG.DMG[type];
    this.atkInt = CFG.ATK_INT[type];
    this.atkT   = Math.random() * this.atkInt;       // stagger first attack

    this.alive  = true;
    this.dying  = false;
    this.dyingT = 0;
    this.w      = 36;   // base width  (scale applied at draw time)
    this.h      = 60;   // base height
  }

  get hitRadius() { return this.w * this.scale * 0.65; }

  update(dt) {
    if (this.dying) { this.dyingT += dt; return; }
    this.x    -= this.speed * dt;
    this.atkT -= dt;
    if (this.atkT <= 0) {
      this.atkT = this.atkInt;
      this._fire();
    }
  }

  _fire() {
    SFX.enemyFire();
    G.eBullets.push({
      x:   this.x - this.w * this.scale * 0.5,
      y:   this.y,
      vx: -400,
      vy:  (Math.random() - 0.5) * 50,
      dmg: this.dmg,
      alive: true,
    });
  }

  hit(dmg) {
    if (this.dying) return;
    this.hp -= dmg;
    spawnBlood(this.x, this.y);
    spawnDmgNum(this.x, this.y - 20 * this.scale, dmg, false);
    if (this.hp <= 0) {
      this.dying = true;
      this.dyingT = 0;
      G.kills++;
      G.score += Math.round(CFG.HP[this.type] * G.day);
      SFX.enemyDie();
      // 40% chance to drop a pickup
      if (Math.random() < 0.40) {
        const types = ['ammo','health','grenade','meds'];
        G.drops.push(new Drop(this.x, this.y, types[Math.floor(Math.random() * 4)]));
      }
    }
  }

  isDone() { return this.dying && this.dyingT > 0.55; }
}

// ═══════════════════════════════════════════════════════════════════════
//  DROP (pickup)
// ═══════════════════════════════════════════════════════════════════════
class Drop {
  constructor(x, y, type) {
    this.x     = x;
    this.y     = y;
    this.type  = type;
    this.vy    = -70;
    this.life  = 8;    // 8 sec before despawn
    this.alive = true;
  }
  update(dt) {
    this.vy   = Math.min(this.vy + 180 * dt, 0);
    this.y   += this.vy * dt;
    this.life -= dt;
    if (this.life <= 0) this.alive = false;
  }
  collect() {
    this.alive = false;
    SFX.pickup();
    switch (this.type) {
      case 'ammo':    G.ammoReserve = Math.min(G.ammoReserve + 15, 120); break;
      case 'health':  G.hp = Math.min(G.hp + 25, CFG.MAX_HP); break;
      case 'grenade': G.grenades = Math.min(G.grenades + 1, 3); break;
      case 'meds':    G.sanity = Math.min(G.sanity + 30, 100); break;
    }
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════════════════════
function spawnParticles(x, y, count, colors, speedMin, speedMax, lifeRange) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = speedMin + Math.random() * (speedMax - speedMin);
    const l = lifeRange[0] + Math.random() * (lifeRange[1] - lifeRange[0]);
    G.particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 30,
      life: l, maxLife: l,
      color: colors[Math.floor(Math.random() * colors.length)],
      r: 2 + Math.random() * 3,
    });
  }
}

function spawnMuzzle(x, y)     { spawnParticles(x, y, 6,  ['#ffdd44','#ff9900','#ffffff'], 50, 160, [0.08, 0.18]); }
function spawnImpact(x, y)     { spawnParticles(x, y, 4,  ['#8B6914','#aa8820'], 20, 60, [0.2, 0.35]); }
function spawnBlood(x, y)      { spawnParticles(x, y, 8,  ['#cc2200','#991100'], 30, 100, [0.3, 0.6]); }
function spawnGrenadeBlast(x,y){ spawnParticles(x, y, 24, ['#ffaa00','#ff6600','#888888','#ffff44'], 80, 240, [0.4, 0.85]); }

function spawnDmgNum(x, y, val, isPlayer) {
  G.dmgNums.push({ x, y, val, isPlayer, life: 0.9, maxLife: 0.9, vy: -58 });
}

// ═══════════════════════════════════════════════════════════════════════
//  WAVE SYSTEM
// ═══════════════════════════════════════════════════════════════════════
function buildQueue(day, wave, phase) {
  const q   = [];
  const cnt = 4 + day * 2 + wave;

  for (let i = 0; i < cnt; i++) {
    let t;
    if (day === 1) {
      t = i % 3 === 0 ? 'scout' : 'soldier';
    } else if (day === 2) {
      t = i % 5 === 4 ? 'sniper' : (i % 2 === 0 ? 'scout' : 'soldier');
    } else if (day === 3) {
      t = ['scout','soldier','soldier','sniper','scout'][i % 5];
    } else if (day === 4) {
      t = i % 6 === 5 ? 'heavy' : ['soldier','sniper','scout','soldier'][i % 4];
    } else {
      // Day 5 — commander spawns as final enemy on last wave
      t = (wave >= 3 && i === cnt - 1) ? 'commander'
        : ['soldier','sniper','heavy','scout','soldier','heavy'][i % 6];
    }
    q.push(t);
  }

  if (phase === 'night') {
    // Shuffle for night unpredictability
    for (let i = q.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [q[i], q[j]] = [q[j], q[i]];
    }
    // Prepend extra scouts at night
    for (let i = 0; i < day; i++) q.unshift('scout');
  }
  return q;
}

function startWave() {
  G.enemies      = [];
  G.eBullets     = [];
  G.spawnQueue   = buildQueue(G.day, G.wave, G.phase);
  G.spawnInterval= Math.max(0.65, CFG.SPAWN_BASE - (G.day - 1) * 0.28 - (G.wave - 1) * 0.12);
  G.spawnTimer   = 0;
  G.inRest       = false;
  G.restTimer    = 0;
}

function spawnNext() {
  if (!G.spawnQueue.length) return;
  const type = G.spawnQueue.shift();
  const lane = Math.floor(Math.random() * 3);
  G.enemies.push(new Enemy(type, lane));
}

function advanceWave() {
  if (G.wave < G.totalWaves) {
    G.wave++;
    startWave();
  } else {
    // Phase complete — flip day/night
    if (G.phase === 'day') {
      G.phase = 'night';
      G.wave  = 1;
      G.totalWaves = 2;
      SFX.phaseChange();
    } else {
      G.phase = 'day';
      G.day++;
      G.wave  = 1;
      G.totalWaves = 3 + G.day;
      SFX.phaseChange();
      // Dawn resupply
      G.grenades    = CFG.MAX_GRENADES;
      G.ammoReserve = Math.min(G.ammoReserve + 30, 120);
      G.sanity      = Math.min(G.sanity + 20, 100);
    }
    if (G.day > 5) { G.screen = 'victory'; SFX.victory(); return; }
    startWave();
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  DRAWING
// ═══════════════════════════════════════════════════════════════════════

// ── Utility ──────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);  ctx.arcTo(x+w, y,   x+w, y+r,   r);
  ctx.lineTo(x + w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x + r, y+h);    ctx.arcTo(x, y+h,   x, y+h-r,   r);
  ctx.lineTo(x, y + r);      ctx.arcTo(x, y,     x+r, y,      r);
  ctx.closePath();
}

// ── Sky gradient ──────────────────────────────────────────────────────
function drawSky() {
  const gH    = gameH();
  const night = G.phase === 'night';
  const grad  = ctx.createLinearGradient(0, 0, 0, gH * 0.55);
  if (night) {
    grad.addColorStop(0, '#010409');
    grad.addColorStop(0.5,'#030c18');
    grad.addColorStop(1, '#091408');
  } else {
    // Sky gets slightly more overcast / ominous each day
    const r = 95  + G.day * 8;
    const g = 140 - G.day * 6;
    grad.addColorStop(0, `rgb(${r},${g},162)`);
    grad.addColorStop(0.65,'#7aac78');
    grad.addColorStop(1,   '#3a5a28');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, gH);
}

// ── Jungle tree silhouette layer ──────────────────────────────────────
// Uses golden-ratio spacing (i * 137.508) for consistent tree positions.
function drawJungleLayer(baseY, color, density, trunkH, canopyR) {
  ctx.fillStyle = color;
  ctx.fillRect(0, baseY, W, gameH() - baseY);
  const count = Math.ceil(W / density);
  for (let i = 0; i < count; i++) {
    const px      = (i * 137.508) % W;
    const hV      = trunkH + ((i * 997) % (trunkH * 0.4));
    const top     = baseY - hV;
    ctx.fillRect(px - 3, top + hV * 0.55, 6, hV * 0.45);
    for (let j = 0; j < 3; j++) {
      const cx = px + ((i * j * 79 + j * 41) % 24) - 12;
      const cy = top + j * (hV * 0.12);
      const cr = canopyR * (0.8 + j * 0.15);
      ctx.beginPath();
      ctx.arc(cx, cy, cr, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ── Full scene background ──────────────────────────────────────────────
function drawBackground() {
  const gH    = gameH();
  const night = G.phase === 'night';

  drawSky();

  drawJungleLayer(gH * 0.44, night ? '#061306' : '#1a3c18', 58, 38, 20);
  drawJungleLayer(gH * 0.56, night ? '#040d04' : '#122e10', 46, 55, 28);

  ctx.fillStyle = night ? '#080c06' : '#2c2006';
  ctx.fillRect(0, gH * 0.64, W, gH * 0.36);

  ctx.fillStyle = night ? '#0b100a' : '#352806';
  for (let i = 0; i < 5; i++) ctx.fillRect(0, gH * 0.66 + i * gH * 0.10, W, 1.5);
}

// ── Foreground trees (drawn after enemies — partial occlusion) ─────────
function drawForeground() {
  drawJungleLayer(gameH() * 0.78, G.phase === 'night' ? '#020702' : '#0c1e0c', 86, 88, 44);
}

// ── Enemy silhouettes ─────────────────────────────────────────────────
const ENEMY_COL = {
  scout:'#18140a', soldier:'#0e190e', sniper:'#1a1a06', heavy:'#1a0c02', commander:'#280202',
};

function drawEnemySilhouette(type) {
  ctx.fillStyle = ENEMY_COL[type];
  if (type === 'scout') {
    ctx.beginPath(); ctx.arc(2, -30, 6, 0, Math.PI*2); ctx.fill();
    ctx.save(); ctx.rotate(0.25); ctx.fillRect(-5, -24, 10, 20); ctx.restore();
    ctx.fillRect(-6, -3, 4, 17); ctx.fillRect(2, -3, 4, 17);
    ctx.fillRect(-14,-20, 22, 3);
  }
  else if (type === 'soldier') {
    ctx.beginPath(); ctx.arc(0, -32, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillRect(-8,-38,16,7); ctx.fillRect(-8,-25,16,24);
    ctx.fillRect(-7,-1,5,20);  ctx.fillRect(2,-1,5,20);
    ctx.fillRect(-17,-24,24,4);
  }
  else if (type === 'sniper') {
    for (let i = -12; i <= 12; i += 6) { ctx.beginPath(); ctx.arc(i,-38,6,0,Math.PI*2); ctx.fill(); }
    ctx.beginPath(); ctx.arc(0,-30,6,0,Math.PI*2); ctx.fill();
    ctx.save(); ctx.rotate(-0.35); ctx.fillRect(-5,-24,10,28); ctx.restore();
    ctx.fillRect(-26,-18,44,3); ctx.fillRect(6,-22,7,6);
  }
  else if (type === 'heavy') {
    ctx.beginPath(); ctx.arc(0,-35,9,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-13,-26,26,28); ctx.fillRect(-10,2,8,22); ctx.fillRect(2,2,8,22);
    ctx.fillRect(-22,-20,36,6);
    ctx.beginPath(); ctx.arc(-24,-17,6,0,Math.PI*2); ctx.fill();
  }
  else if (type === 'commander') {
    ctx.fillRect(-11,-46,22,5);
    ctx.beginPath(); ctx.arc(0,-38,8,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-10,-30,20,30); ctx.fillRect(-15,-30,9,5); ctx.fillRect(6,-30,9,5);
    ctx.fillRect(-8,0,6,22); ctx.fillRect(2,0,6,22);
    ctx.fillRect(-20,-24,18,4);
  }
}

function drawEnemy(e) {
  if (!e.alive && !e.dying) return;
  const alpha = e.dying ? Math.max(0, 1 - e.dyingT / 0.55) : 1;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(e.x, e.y);
  ctx.scale(e.scale, e.scale);
  if (e.dying) { ctx.rotate(e.dyingT * 3.2); ctx.translate(e.dyingT * 50, e.dyingT * 40); }
  drawEnemySilhouette(e.type);
  ctx.restore();

  if (!e.dying && e.hp > 0) {
    const bw = 38 * e.scale, bx = e.x - bw * 0.5, by = e.y - (e.h * 0.5 + 14) * e.scale;
    const frac = e.hp / e.maxHp;
    ctx.fillStyle = '#222'; ctx.fillRect(bx, by, bw, 4);
    ctx.fillStyle = frac > 0.55 ? '#44cc44' : frac > 0.28 ? '#ffaa00' : '#ff3300';
    ctx.fillRect(bx, by, bw * frac, 4);
  }
}

// ── Pickups ────────────────────────────────────────────────────────────
const DROP_COL = { ammo:'#f0c040', health:'#44dd44', grenade:'#ff8800', meds:'#44dddd' };
const DROP_LBL = { ammo:'A', health:'+', grenade:'G', meds:'M' };

function drawDrop(d) {
  if (!d.alive) return;
  const pulse = 0.85 + Math.sin(Date.now() * 0.006) * 0.15;
  ctx.save();
  ctx.globalAlpha = Math.min(1, d.life * 0.5) * pulse;
  ctx.fillStyle   = DROP_COL[d.type];
  ctx.beginPath(); ctx.arc(d.x, d.y, 10, 0, Math.PI * 2); ctx.fill();

}

// ── Particles ──────────────────────────────────────────────────────────
function drawParticles() {
  G.particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.save(); ctx.globalAlpha = a * 0.9; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2); ctx.fill();

// ── Night torch overlay ────────────────────────────────────────────────
function drawNightOverlay() {
  if (G.phase !== 'night') return;
  const gH = gameH();
  const cx = (G.touching && G.crossX >= 0) ? G.crossX : W * 0.5;
  const cy = (G.touching && G.crossY >= 0) ? G.crossY : gH * 0.5;

  const sanFrac = G.sanity / 100;
  const baseR   = CFG.TORCH_MIN + (CFG.TORCH_BASE - CFG.TORCH_MIN) * sanFrac;
  const flicker = 1 + Math.sin(Date.now() * 0.0075) * 0.04;
  const torchR  = baseR * flicker;

  // Soft glow halo
  const glow = ctx.createRadialGradient(cx, cy, torchR * 0.25, cx, cy, torchR * 1.15);
  glow.addColorStop(0, 'rgba(0,0,0,0)');
  glow.addColorStop(0.7,'rgba(0,0,0,0.1)');
  glow.addColorStop(1,  'rgba(0,0,0,0.97)');
  ctx.fillStyle = glow; ctx.fillRect(0, 0, W, gH);

  // Hard darkness mask with evenodd cutout
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.97)';
  ctx.beginPath();
  ctx.rect(0, 0, W, gH);
  ctx.arc(cx, cy, torchR, 0, Math.PI * 2, true);
  ctx.fill('evenodd');
  ctx.restore();

  // Warm amber tint inside torch
  const warm = ctx.createRadialGradient(cx, cy, 0, cx, cy, torchR * 0.6);
  warm.addColorStop(0, 'rgba(255,160,40,0.06)');
  warm.addColorStop(1, 'rgba(255,160,40,0)');
  ctx.fillStyle = warm; ctx.fillRect(0, 0, W, gH);
}

// ═══════════════════════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════════════════════
function shoot(x, y) {
  if (G.inRest || y >= gameH()) return;
  if (G.ammo <= 0) { SFX.emptyClick(); return; }
  G.ammo--;
  SFX.shoot();
  spawnMuzzle(x, y);

  const acc  = 0.68 + (G.sanity / 100) * 0.32;  // low sanity = shaky aim
  const hitR = CFG.SHOOT_RADIUS * acc;
  const dmg  = Math.round(CFG.BULLET_DMG * acc);

  // Collect nearby drops first
  G.drops.forEach(d => {
    if (d.alive && Math.hypot(d.x-x, d.y-y) < 26) d.collect();
  });

  // Hit nearest enemy within tolerance
  const live = G.enemies.filter(e => e.alive && !e.dying);
  live.sort((a, b) => Math.hypot(a.x-x,a.y-y) - Math.hypot(b.x-x,b.y-y));
  for (const e of live) {
    if (Math.hypot(e.x-x, e.y-y) < hitR + e.hitRadius) { e.hit(dmg); return; }
  }
  spawnImpact(x, y);
}

function throwGrenade() {
  if (G.grenades <= 0 || G.inRest) return;
  G.grenades--;
  SFX.grenadeThrow();
  const bx = W * 0.56, by = gameH() * 0.53;
  spawnGrenadeBlast(bx, by);
  SFX.grenadeExplode();
  G.hitFlash = 0.2;
  G.enemies.filter(e => e.alive && !e.dying).forEach(e => {
    const d = Math.hypot(e.x-bx, e.y-by);
    if (d < CFG.GRENADE_RADIUS) e.hit(Math.round(CFG.GRENADE_DMG * (1 - d / CFG.GRENADE_RADIUS)));
  });
}

function reload() {
  const need  = CFG.MAX_AMMO - G.ammo;
  const avail = Math.min(need, G.ammoReserve);
  if (avail > 0) SFX.reload();
  G.ammo += avail; G.ammoReserve -= avail;
}

// ═══════════════════════════════════════════════════════════════════════
//  UPDATE (per-frame logic)
// ═══════════════════════════════════════════════════════════════════════
function update(dt) {
  if (G.phase === 'night') G.sanity = Math.max(0, G.sanity - CFG.SANITY_DRAIN * dt);
  G.hitFlash = Math.max(0, G.hitFlash - dt * 3.5);

  G.particles.forEach(p => { p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 140*dt; p.life -= dt; });
  G.particles = G.particles.filter(p => p.life > 0);

  G.dmgNums.forEach(n => { n.y += n.vy*dt; n.life -= dt; });
  G.dmgNums = G.dmgNums.filter(n => n.life > 0);

  G.drops.forEach(d => d.update(dt));
  G.drops = G.drops.filter(d => d.alive);

  G.eBullets.forEach(b => {
    if (!b.alive) return;
    b.x += b.vx*dt; b.y += b.vy*dt;
    if (b.x < W * 0.12) {
      b.alive = false;
      // Only 55% of enemy shots actually connect — cover mechanic
      if (Math.random() < 0.55) {
        G.hp = Math.max(0, G.hp - b.dmg);
        G.hitFlash = 0.4;
        SFX.playerHit();
        spawnDmgNum(W*0.22, gameH()*0.62, b.dmg, true);
        if (G.hp <= 0) { G.screen = 'gameover'; SFX.gameOver(); }
      }
    }
    if (b.x < -20) b.alive = false;
  });
  G.eBullets = G.eBullets.filter(b => b.alive);

  if (G.inRest) {
    G.restTimer += dt;
    if (G.restTimer >= CFG.REST_DURATION) advanceWave();
    return;
  }

  if (G.spawnQueue.length > 0) {
    G.spawnTimer += dt;
    if (G.spawnTimer >= G.spawnInterval) { G.spawnTimer = 0; spawnNext(); }
  }

  G.enemies.forEach(e => e.update(dt));

  G.enemies.forEach(e => {
    if (!e.alive || e.dying || e.x >= -30) return;
    G.hp = Math.max(0, G.hp - e.dmg * 2);
    G.hitFlash = 0.45;
    SFX.playerHit();
    spawnDmgNum(W*0.25, gameH()*0.65, e.dmg*2, true);
    e.dying = true;
    if (G.hp <= 0) { G.screen = 'gameover'; SFX.gameOver(); }
  });

  G.enemies = G.enemies.filter(e => !e.isDone());

  const allSpawned = G.spawnQueue.length === 0;
  const allDone    = G.enemies.filter(e => e.alive || e.dying).length === 0;
  if (allSpawned && allDone) {
    G.inRest = true; G.restTimer = 0;
    G.hp = Math.min(G.hp + 18, CFG.MAX_HP);
    SFX.waveClear();
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════════════════
function buttonAt(x, y) {
  const hy = gameH(), pad = 16, bS = 48, bY = hy + CFG.HUD_H - bS - 8;
  if (x >= pad && x <= pad+bS && y >= bY && y <= bY+bS) return 'grenade';
  if (x >= W-pad-bS && x <= W-pad && y >= bY && y <= bY+bS) return 'reload';
  return null;
}

function menuBtnHit(x, y) {
  const bX = W*0.5-100, bY = H*0.61;
  return x >= bX && x <= bX+200 && y >= bY && y <= bY+50;
}

function onTap(x, y) {
  if (G.screen === 'menu') {
    if (menuBtnHit(x, y)) { reset(); G.screen = 'playing'; startWave(); }
    return;
  }
  if (G.screen === 'gameover' || G.screen === 'victory') { reset(); G.screen = 'menu'; return; }
  if (G.screen === 'playing') {
    const btn = buttonAt(x, y);
    if (btn === 'grenade') { throwGrenade(); return; }
    if (btn === 'reload')  { reload(); return; }
    shoot(x, y);
  }
}

// ── Multi-touch safe (touch ID tracking prevents ghost inputs) ──────────
const touchMap = {};

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    touchMap[t.identifier] = { x: t.clientX, y: t.clientY };
    G.crossX = t.clientX; G.crossY = t.clientY; G.touching = true;
    onTap(t.clientX, t.clientY);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (!touchMap[t.identifier]) continue;
    touchMap[t.identifier] = { x: t.clientX, y: t.clientY };
    if (t.clientY < gameH()) { G.crossX = t.clientX; G.crossY = t.clientY; }
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) delete touchMap[t.identifier];
  if (Object.keys(touchMap).length === 0) G.touching = false;
}, { passive: false });

canvas.addEventListener('mousemove', e => { G.crossX = e.clientX; G.crossY = e.clientY; });
canvas.addEventListener('mousedown', e => onTap(e.clientX, e.clientY));
canvas.addEventListener('mouseleave', () => { G.crossX = -1; G.crossY = -1; });

window.addEventListener('keydown', e => {
  if (G.screen !== 'playing') return;
  if (e.key.toLowerCase() === 'r') reload();
  if (e.key.toLowerCase() === 'g') throwGrenade();
});

// ═══════════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════════════
function loop(ts) {
  const dt = Math.min((ts - (G.lastTime || ts)) / 1000, 0.05);
  G.lastTime = ts;
  ctx.clearRect(0, 0, W, H);

  if (G.screen === 'menu')     { drawMenu(); }
  else if (G.screen === 'gameover') { drawGameOver(); }
  else if (G.screen === 'victory')  { drawVictory(); }
  else {
    update(dt);
    drawBackground();
    [...G.enemies].sort((a,b) => a.lane - b.lane).forEach(drawEnemy);
    drawForeground();
    drawEnemyBullets();
    drawParticles();
    G.drops.forEach(drawDrop);
    drawDmgNums();
    drawNightOverlay();
    drawHitFlash();
    drawCrosshair();
    drawHUD();
    drawWaveBanner();
  }
  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
