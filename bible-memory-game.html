<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sacred Word — NABRE Bible Memory Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8D08A;
    --deep: #1A1208;
    --parchment: #F5EDD6;
    --parchment-dark: #E8D9B8;
    --crimson: #8B1A1A;
    --ink: #2C1F0F;
    --shadow: rgba(26,18,8,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--deep);
    color: var(--parchment);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ornate background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(139,26,26,0.08) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px),
      repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,0.02) 60px, rgba(201,168,76,0.02) 61px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 2.5rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid rgba(201,168,76,0.3);
  }

  .cross-ornament {
    font-size: 1.4rem;
    color: var(--gold);
    letter-spacing: 0.5rem;
    display: block;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    color: var(--gold-light);
    letter-spacing: 0.1rem;
    line-height: 1.1;
  }

  .subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1rem;
    color: rgba(245,237,214,0.6);
    margin-top: 0.4rem;
    letter-spacing: 0.05rem;
  }

  /* Mode Tabs */
  .mode-tabs {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .tab-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.4);
    color: rgba(245,237,214,0.7);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    letter-spacing: 0.08rem;
    padding: 0.5rem 1.4rem;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: uppercase;
  }

  .tab-btn:hover, .tab-btn.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  .tab-btn.active {
    background: rgba(201,168,76,0.2);
  }

  /* Stats Bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-bottom: 2rem;
    font-size: 0.9rem;
    color: rgba(245,237,214,0.6);
    letter-spacing: 0.05rem;
  }

  .stat { text-align: center; }
  .stat-num {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: var(--gold);
    line-height: 1.1;
  }
  .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1rem; }

  /* Progress */
  .progress-bar-outer {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.2);
    height: 4px;
    margin-bottom: 2rem;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--crimson), var(--gold));
    transition: width 0.5s ease;
    border-radius: 2px;
  }

  /* ========== FLASHCARD ========== */
  .flashcard-area { perspective: 1200px; }

  .flashcard {
    position: relative;
    width: 100%;
    height: 320px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    margin-bottom: 1.5rem;
  }

  .flashcard.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border: 1px solid rgba(201,168,76,0.35);
    background:
      linear-gradient(135deg, rgba(245,237,214,0.05) 0%, transparent 60%),
      rgba(26,18,8,0.8);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem;
    text-align: center;
  }

  .card-face::before, .card-face::after {
    content: '✦';
    position: absolute;
    color: rgba(201,168,76,0.3);
    font-size: 0.7rem;
  }
  .card-face::before { top: 1rem; left: 1rem; }
  .card-face::after { bottom: 1rem; right: 1rem; }

  .card-back { transform: rotateY(180deg); }

  .card-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2rem;
    color: var(--gold);
    margin-bottom: 1rem;
    display: block;
  }

  .card-reference {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--gold-light);
    margin-bottom: 0.5rem;
  }

  .card-book {
    font-style: italic;
    color: rgba(245,237,214,0.5);
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }

  .card-hint {
    font-size: 0.8rem;
    color: rgba(245,237,214,0.35);
    letter-spacing: 0.05rem;
    margin-top: 1.5rem;
  }

  .card-verse {
    font-family: 'IM Fell English', serif;
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    line-height: 1.7;
    color: var(--parchment);
    font-style: italic;
  }

  /* Card nav */
  .card-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
  }

  .nav-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.35);
    color: var(--gold);
    font-size: 1.2rem;
    width: 42px; height: 42px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: serif;
  }
  .nav-btn:hover { background: rgba(201,168,76,0.15); border-color: var(--gold); }

  .card-counter {
    font-family: 'Playfair Display', serif;
    color: rgba(245,237,214,0.5);
    font-size: 0.95rem;
  }

  /* Known/Unknown */
  .mastery-btns {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .mastery-btn {
    flex: 1; max-width: 180px;
    padding: 0.7rem 1rem;
    border: 1px solid;
    background: transparent;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.05rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mastery-btn.know {
    border-color: rgba(80,160,80,0.5);
    color: #8BC88B;
  }
  .mastery-btn.know:hover { background: rgba(80,160,80,0.1); }

  .mastery-btn.review {
    border-color: rgba(201,168,76,0.4);
    color: var(--gold);
  }
  .mastery-btn.review:hover { background: rgba(201,168,76,0.1); }

  /* ========== MULTIPLE CHOICE ========== */
  .mc-question {
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(26,18,8,0.6);
    padding: 2rem 2.5rem;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .mc-question::before {
    content: '✦';
    position: absolute;
    top: 1rem; left: 1rem;
    color: rgba(201,168,76,0.25);
    font-size: 0.6rem;
  }

  .mc-prompt {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.18rem;
    color: var(--gold);
    margin-bottom: 1rem;
    display: block;
  }

  .mc-verse {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(1.05rem, 2.5vw, 1.3rem);
    line-height: 1.75;
    color: var(--parchment);
    margin-bottom: 1.5rem;
  }

  .mc-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  @media (max-width: 500px) { .mc-options { grid-template-columns: 1fr; } }

  .mc-option {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.25);
    color: rgba(245,237,214,0.8);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    padding: 0.75rem 1rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02rem;
    line-height: 1.3;
  }

  .mc-option:hover:not(:disabled) {
    background: rgba(201,168,76,0.12);
    border-color: var(--gold);
    color: var(--parchment);
  }

  .mc-option.correct {
    background: rgba(80,160,80,0.15);
    border-color: #5DA05D;
    color: #A8D8A8;
  }

  .mc-option.incorrect {
    background: rgba(160,40,40,0.15);
    border-color: #A04040;
    color: #D8A0A0;
  }

  .mc-option:disabled { cursor: default; }

  .mc-feedback {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    font-style: italic;
    font-size: 1rem;
    display: none;
    border-left: 3px solid;
  }
  .mc-feedback.show { display: block; }
  .mc-feedback.correct-fb { color: #8BC88B; border-color: #5DA05D; }
  .mc-feedback.wrong-fb { color: #D8A0A0; border-color: #A04040; }

  .next-btn {
    display: none;
    margin: 1.5rem auto 0;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.1rem;
    padding: 0.6rem 2rem;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { background: rgba(201,168,76,0.15); }

  /* ========== FILL IN THE BLANK ========== */
  .fitb-area {}

  .fitb-card {
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(26,18,8,0.6);
    padding: 2rem 2.5rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .fitb-verse {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 2.5vw, 1.35rem);
    line-height: 1.9;
    color: var(--parchment);
    margin-bottom: 1.5rem;
  }

  .blank {
    display: inline-block;
    border-bottom: 2px solid var(--gold);
    min-width: 80px;
    color: transparent;
    position: relative;
    margin: 0 0.2rem;
  }

  .blank.revealed {
    color: var(--gold-light);
  }

  .fitb-input {
    background: rgba(245,237,214,0.05);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--parchment);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    padding: 0.5rem 1rem;
    width: 100%;
    max-width: 320px;
    margin-bottom: 0.75rem;
    text-align: center;
    outline: none;
    letter-spacing: 0.05rem;
  }
  .fitb-input:focus { border-color: var(--gold); }
  .fitb-input::placeholder { color: rgba(245,237,214,0.25); }

  .fitb-submit {
    background: rgba(201,168,76,0.15);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.08rem;
    padding: 0.5rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    display: block;
    margin: 0 auto;
  }
  .fitb-submit:hover { background: rgba(201,168,76,0.25); }

  .fitb-reference {
    font-family: 'Playfair Display', serif;
    color: var(--gold);
    font-size: 1rem;
    margin-bottom: 0.3rem;
  }

  /* Category filter */
  .filter-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.25);
    color: rgba(245,237,214,0.55);
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.82rem;
    letter-spacing: 0.06rem;
    padding: 0.3rem 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(201,168,76,0.1);
  }

  /* Divider */
  .ornate-divider {
    text-align: center;
    color: rgba(201,168,76,0.4);
    font-size: 0.9rem;
    letter-spacing: 0.5rem;
    margin: 0.5rem 0 1.5rem;
  }

  /* Score result */
  .result-panel {
    text-align: center;
    padding: 3rem 2rem;
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(26,18,8,0.7);
    display: none;
  }
  .result-panel.show { display: block; }

  .result-score {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    color: var(--gold);
    display: block;
    margin-bottom: 0.5rem;
  }

  .result-text {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: rgba(245,237,214,0.7);
    margin-bottom: 1.5rem;
  }

  .restart-btn {
    background: rgba(201,168,76,0.15);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    letter-spacing: 0.1rem;
    padding: 0.7rem 2rem;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .restart-btn:hover { background: rgba(201,168,76,0.25); }

  .hidden { display: none !important; }

  /* Streak badge */
  .streak-badge {
    display: inline-block;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold);
    font-size: 0.8rem;
    padding: 0.15rem 0.6rem;
    letter-spacing: 0.05rem;
    margin-left: 0.5rem;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <span class="cross-ornament">✝</span>
    <h1>Sacred Word</h1>
    <p class="subtitle">Catholic Scripture Memory — New American Bible Revised Edition</p>
  </header>

  <!-- Mode Tabs -->
  <div class="mode-tabs">
    <button class="tab-btn active" onclick="switchMode('flashcard')" aria-label="Flashcard mode">✦ Flashcards</button>
    <button class="tab-btn" onclick="switchMode('multiple-choice')" aria-label="Multiple choice mode">✦ Multiple Choice</button>
    <button class="tab-btn" onclick="switchMode('fill-blank')" aria-label="Fill in the blank mode">✦ Fill in the Blank</button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat"><span class="stat-num" id="stat-score">0</span><span class="stat-label">Score</span></div>
    <div class="stat"><span class="stat-num" id="stat-streak">0</span><span class="stat-label">Streak</span></div>
    <div class="stat"><span class="stat-num" id="stat-mastered">0</span><span class="stat-label">Mastered</span></div>
    <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-label">Total</span></div>
  </div>

  <div class="progress-bar-outer">
    <div class="progress-bar-inner" id="progress-bar" style="width:0%"></div>
  </div>

  <!-- Category Filter -->
  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('Old Testament', this)">Old Testament</button>
    <button class="filter-btn" onclick="setFilter('New Testament', this)">New Testament</button>
    <button class="filter-btn" onclick="setFilter('Deuterocanon', this)">Deuterocanon</button>
    <button class="filter-btn" onclick="setFilter('Psalms', this)">Psalms</button>
    <button class="filter-btn" onclick="setFilter('Gospel', this)">Gospels</button>
  </div>

  <div class="ornate-divider">✦ ✦ ✦</div>

  <!-- ===== FLASHCARD MODE ===== -->
  <div id="mode-flashcard">
    <div class="flashcard-area">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front">
          <span class="card-label">Scripture Reference</span>
          <div class="card-reference" id="fc-reference">—</div>
          <div class="card-book" id="fc-book">—</div>
          <span class="card-hint">Click to reveal the verse</span>
        </div>
        <div class="card-face card-back">
          <span class="card-label">The Verse</span>
          <div class="card-verse" id="fc-verse">—</div>
        </div>
      </div>
    </div>

    <div class="card-nav">
      <button class="nav-btn" onclick="changeCard(-1)" aria-label="Previous card">←</button>
      <span class="card-counter" id="fc-counter">1 / 1</span>
      <button class="nav-btn" onclick="changeCard(1)" aria-label="Next card">→</button>
    </div>

    <div class="mastery-btns">
      <button class="mastery-btn review" onclick="markCard('review')">↻ Still Learning</button>
      <button class="mastery-btn know" onclick="markCard('known')">✓ I Know This</button>
    </div>
  </div>

  <!-- ===== MULTIPLE CHOICE MODE ===== -->
  <div id="mode-multiple-choice" class="hidden">
    <div class="mc-question" id="mc-card">
      <span class="mc-prompt">Which reference matches this verse?</span>
      <div class="mc-verse" id="mc-verse">—</div>
      <div class="mc-options" id="mc-options"></div>
      <div class="mc-feedback" id="mc-feedback"></div>
      <button class="next-btn" id="mc-next" onclick="nextMC()">Next Verse →</button>
    </div>
    <div class="result-panel" id="mc-result">
      <span class="result-score" id="mc-result-score">—</span>
      <p class="result-text" id="mc-result-text">—</p>
      <button class="restart-btn" onclick="restartMC()">Begin Again</button>
    </div>
  </div>

  <!-- ===== FILL IN THE BLANK MODE ===== -->
  <div id="mode-fill-blank" class="hidden">
    <div class="fitb-card">
      <div class="fitb-reference" id="fitb-reference">—</div>
      <div class="fitb-verse" id="fitb-verse">—</div>
      <input type="text" class="fitb-input" id="fitb-input" placeholder="Type the missing word…" autocomplete="off">
      <button class="fitb-submit" onclick="checkFITB()">Confirm</button>
      <div class="mc-feedback" id="fitb-feedback"></div>
      <button class="next-btn" id="fitb-next" onclick="nextFITB()">Next Verse →</button>
    </div>
  </div>

</div>

<script>
// ============================================================
//  SCRIPTURE DATA — NABRE (New American Bible Revised Edition)
// ============================================================
const VERSES = [
  // Psalms
  { ref: "Psalm 23:1", book: "Psalms", cat: ["Psalms","Old Testament"],
    verse: "The LORD is my shepherd; there is nothing I lack." },
  { ref: "Psalm 46:2", book: "Psalms", cat: ["Psalms","Old Testament"],
    verse: "God is our refuge and our strength, an ever-present help in distress." },
  { ref: "Psalm 119:105", book: "Psalms", cat: ["Psalms","Old Testament"],
    verse: "Your word is a lamp for my feet, a light for my path." },
  { ref: "Psalm 27:1", book: "Psalms", cat: ["Psalms","Old Testament"],
    verse: "The LORD is my light and my salvation; whom do I fear? The LORD is my life's refuge; of whom am I afraid?" },
  { ref: "Psalm 100:3", book: "Psalms", cat: ["Psalms","Old Testament"],
    verse: "Know that the LORD is God, our maker to whom we belong, whose people we are, God's well-tended flock." },
  { ref: "Psalm 139:14", book: "Psalms", cat: ["Psalms","Old Testament"],
    verse: "I praise you, because I am wonderfully made; wonderful are your works! My very self you know." },
  { ref: "Psalm 51:12", book: "Psalms", cat: ["Psalms","Old Testament"],
    verse: "A clean heart create for me, God; renew within me a steadfast spirit." },

  // Old Testament
  { ref: "Genesis 1:1", book: "Genesis", cat: ["Old Testament"],
    verse: "In the beginning, when God created the heavens and the earth." },
  { ref: "Proverbs 3:5–6", book: "Proverbs", cat: ["Old Testament"],
    verse: "Trust in the LORD with all your heart, on your own intelligence do not rely; in all your ways be mindful of him, and he will make straight your paths." },
  { ref: "Isaiah 40:31", book: "Isaiah", cat: ["Old Testament"],
    verse: "They that hope in the LORD will renew their strength, they will soar on eagles' wings; they will run and not grow weary, walk and not grow faint." },
  { ref: "Joshua 1:9", book: "Joshua", cat: ["Old Testament"],
    verse: "I command you: be strong and steadfast! Do not fear nor be dismayed, for the LORD, your God, is with you wherever you go." },
  { ref: "Jeremiah 29:11", book: "Jeremiah", cat: ["Old Testament"],
    verse: "For I know well the plans I have in mind for you—oracle of the LORD—plans for your welfare and not for woe, so as to give you a future of hope." },
  { ref: "Deuteronomy 6:5", book: "Deuteronomy", cat: ["Old Testament"],

// ============================================================
//  STATE
// ============================================================
let currentMode = 'flashcard';
let activeFilter = 'all';
let filteredVerses = [];
let cardIndex = 0;
let isFlipped = false;
let masteredSet = new Set();
let score = 0;
let streak = 0;
let mcIndex = 0;
let mcShuffled = [];
let mcAnswered = false;
let fitbIndex = 0;
let fitbShuffled = [];
let fitbAnswered = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function updateStats() {
  document.getElementById('stat-score').textContent = score;
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-mastered').textContent = masteredSet.size;
  document.getElementById('stat-total').textContent = filteredVerses.length;
  const pct = filteredVerses.length ? (masteredSet.size / filteredVerses.length) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filteredVerses = cat === 'all' ? VERSES : VERSES.filter(v => v.cat.includes(cat));
  cardIndex = 0;
  mcShuffled = shuffle(filteredVerses);
  mcIndex = 0;
  fitbShuffled = shuffle(filteredVerses);
  fitbIndex = 0;
  masteredSet.clear();
  updateStats();
  if (currentMode === 'flashcard') renderFlashcard();
  if (currentMode === 'multiple-choice') renderMC();
  if (currentMode === 'fill-blank') renderFITB();
}

function switchMode(mode) {
  currentMode = mode;
  // Reset score and streak on mode switch for clean slate
  score = 0;
  streak = 0;
  masteredSet.clear();
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.remove('active'));
  const modes = ['flashcard', 'multiple-choice', 'fill-blank'];
  const tabs = document.querySelectorAll('.tab-btn');
  tabs[modes.indexOf(mode)]?.classList.add('active');
  document.getElementById('mode-flashcard').classList.toggle('hidden', mode !== 'flashcard');
  document.getElementById('mode-multiple-choice').classList.toggle('hidden', mode !== 'multiple-choice');
  document.getElementById('mode-fill-blank').classList.toggle('hidden', mode !== 'fill-blank');
  updateStats();
  if (mode === 'multiple-choice') { mcShuffled = shuffle(filteredVerses); mcIndex = 0; renderMC(); }
  if (mode === 'fill-blank') { fitbShuffled = shuffle(filteredVerses); fitbIndex = 0; renderFITB(); }
}

// ============================================================
//  FLASHCARD
// ============================================================
function renderFlashcard() {
  if (!filteredVerses.length) return;
  const v = filteredVerses[cardIndex];
  document.getElementById('fc-reference').textContent = v.ref;
  document.getElementById('fc-book').textContent = v.book;
  document.getElementById('fc-verse').textContent = '"' + v.verse + '"';
  document.getElementById('fc-counter').textContent = (cardIndex + 1) + ' / ' + filteredVerses.length;
  const card = document.getElementById('flashcard');
  card.classList.remove('flipped');
  isFlipped = false;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', isFlipped);
}

function changeCard(dir) {
  cardIndex = (cardIndex + dir + filteredVerses.length) % filteredVerses.length;
  renderFlashcard();
}

function markCard(type) {
  const v = filteredVerses[cardIndex];
  if (type === 'known') {
    masteredSet.add(v.ref);
    score += 5;
    streak++;
  } else {
    masteredSet.delete(v.ref);
    streak = 0;
  }
  updateStats();
  changeCard(1);
}

// ============================================================
//  MULTIPLE CHOICE
// ============================================================
function renderMC() {
  if (!filteredVerses.length) return;
  document.getElementById('mc-result').classList.remove('show');
  document.querySelector('.mc-question').style.display = 'block';

  if (mcIndex >= mcShuffled.length) {
    showMCResult();
    return;
  }
  mcAnswered = false;
  const v = mcShuffled[mcIndex];
  document.getElementById('mc-verse').textContent = '"' + v.verse + '"';

  // Build 4 options: correct + 3 random wrong
  const others = shuffle(filteredVerses.filter(x => x.ref !== v.ref)).slice(0, 3);
  const options = shuffle([v, ...others]);

  const container = document.getElementById('mc-options');
  container.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'mc-option';
    btn.textContent = opt.ref;
    btn.dataset.ref = opt.ref;
    btn.onclick = () => answerMC(btn, opt.ref === v.ref, v.ref);
    container.appendChild(btn);
  });

  const fb = document.getElementById('mc-feedback');
  fb.className = 'mc-feedback';
  fb.textContent = '';
  document.getElementById('mc-next').classList.remove('show');
}

function answerMC(btn, correct, correctRef) {
  if (mcAnswered) return;
  mcAnswered = true;
  btn.classList.add(correct ? 'correct' : 'incorrect');

  if (!correct) {
    // Highlight correct answer using data-ref attribute
    document.querySelectorAll('.mc-option').forEach(b => {
      if (b.dataset.ref === correctRef) b.classList.add('correct');
    });
    streak = 0;
  } else {
    score += 10;
    streak++;
  }

  // Disable all
  document.querySelectorAll('.mc-option').forEach(b => b.disabled = true);

  const fb = document.getElementById('mc-feedback');
  if (correct) {
    fb.textContent = '✦ Excellent! "' + mcShuffled[mcIndex].ref + '" — ' + mcShuffled[mcIndex].book;
    fb.className = 'mc-feedback correct-fb show';
  } else {
    fb.textContent = '✦ The correct answer is ' + correctRef;
    fb.className = 'mc-feedback wrong-fb show';
  }
  document.getElementById('mc-next').classList.add('show');
  updateStats();
}

function nextMC() {
  mcIndex++;
  renderMC();
}

function showMCResult() {
  document.querySelector('.mc-question').style.display = 'none';
  const panel = document.getElementById('mc-result');
  panel.classList.add('show');
  const total = mcShuffled.length;
  document.getElementById('mc-result-score').textContent = score + ' pts';
  const messages = [
    [0.8, "Well done! Your knowledge of scripture is growing strong."],
    [0.5, "A good effort. Keep reading and practicing."],
    [0, "Keep persevering. Faith and knowledge grow with practice."]
  ];
  const ratio = masteredSet.size / total;
  const msg = messages.find(([t]) => ratio >= t);
  document.getElementById('mc-result-text').textContent = msg[1];
}

function restartMC() {
  mcShuffled = shuffle(filteredVerses);
  mcIndex = 0;
  score = 0;
  streak = 0;
  masteredSet.clear();
  updateStats();
  document.getElementById('mc-result').classList.remove('show');
  document.querySelector('.mc-question').style.display = 'block';
  renderMC();
}

// ============================================================
//  FILL IN THE BLANK
// ============================================================
function getFITBData(v) {
  // Pick a random "meaningful" word (len >= 4, not common stop words)
  const stopWords = new Set(['that','with','have','this','from','they','were','also','into','upon','which','will','your','their','what','when','come','been','its','and','the','for','not','but','him','his','her','our','you','all','one','who','any','are','more','than','even','does','said','says','shall','those','these','LORD','God','Lord','Jesus','because','very','good','great','make','give','know','like','such','there','here','every','each','only','just','then','them','thus']);
  const words = v.verse.split(/\s+/);
  const candidates = words.map((w, i) => ({ w: w.replace(/[^a-zA-Z]/g, ''), i }))
    .filter(({ w }) => w.length >= 4 && !stopWords.has(w.toLowerCase()));
  if (!candidates.length) return { displayed: v.verse, answer: words[Math.floor(words.length/2)].replace(/[^a-zA-Z]/g,''), blankIdx: Math.floor(words.length/2) };
  const chosen = candidates[Math.floor(Math.random() * candidates.length)];
  const blank = '_'.repeat(chosen.w.length);
  const displayed = words.map((w, i) => i === chosen.i ? '<span class="blank" id="fitb-blank">' + blank + '</span>' : w).join(' ');
  return { displayed, answer: chosen.w, blankIdx: chosen.i };
}

let fitbCurrentData = null;

function renderFITB() {
  if (!filteredVerses.length) return;

  // Show completion screen after going through all verses
  if (fitbIndex >= fitbShuffled.length) {
    document.querySelector('.fitb-card').style.display = 'none';
    let resultPanel = document.getElementById('fitb-result');
    if (!resultPanel) {
      resultPanel = document.createElement('div');
      resultPanel.id = 'fitb-result';
      resultPanel.className = 'result-panel show';
      resultPanel.innerHTML = `
        <span class="result-score" id="fitb-result-score">${score} pts</span>
        <p class="result-text">Well done — you completed all ${fitbShuffled.length} verses!</p>
        <button class="restart-btn" onclick="restartFITB()">Begin Again</button>`;
      document.getElementById('mode-fill-blank').appendChild(resultPanel);
    } else {
      resultPanel.querySelector('#fitb-result-score').textContent = score + ' pts';
      resultPanel.classList.add('show');
    }
    return;
  }

  // Hide result panel if showing
  const resultPanel = document.getElementById('fitb-result');
  if (resultPanel) resultPanel.classList.remove('show');
  document.querySelector('.fitb-card').style.display = 'block';

  fitbAnswered = false;
  const v = fitbShuffled[fitbIndex];
  fitbCurrentData = { ...getFITBData(v), verse: v };

  document.getElementById('fitb-reference').textContent = v.ref + ' — ' + v.book;
  document.getElementById('fitb-verse').innerHTML = '"' + fitbCurrentData.displayed + '"';
  document.getElementById('fitb-input').value = '';
  document.getElementById('fitb-input').disabled = false;

  const fb = document.getElementById('fitb-feedback');
  fb.className = 'mc-feedback';
  fb.textContent = '';
  document.getElementById('fitb-next').classList.remove('show');

  // Enter key
  const inp = document.getElementById('fitb-input');
  inp.onkeydown = (e) => { if (e.key === 'Enter') checkFITB(); };
  inp.focus();
}

function restartFITB() {
  fitbShuffled = shuffle(filteredVerses);
  fitbIndex = 0;
  score = 0;
  streak = 0;
  masteredSet.clear();
  updateStats();
  document.querySelector('.fitb-card').style.display = 'block';
  const resultPanel = document.getElementById('fitb-result');
  if (resultPanel) resultPanel.classList.remove('show');
  renderFITB();
}

function checkFITB() {
  if (fitbAnswered || !fitbCurrentData) return;
  const input = document.getElementById('fitb-input').value.trim().toLowerCase().replace(/[^a-z]/g,'');
  const correct = fitbCurrentData.answer.toLowerCase();
  fitbAnswered = true;
  document.getElementById('fitb-input').disabled = true;

  // Reveal blank
  const blankEl = document.getElementById('fitb-blank');
  if (blankEl) { blankEl.textContent = fitbCurrentData.answer; blankEl.classList.add('revealed'); }

  const fb = document.getElementById('fitb-feedback');
  if (input === correct) {
    fb.textContent = '✦ Correct! Well done.';
    fb.className = 'mc-feedback correct-fb show';
    score += 8;
    streak++;
  } else {
    fb.textContent = '✦ The missing word was: ' + fitbCurrentData.answer;
    fb.className = 'mc-feedback wrong-fb show';
    streak = 0;
  }
  document.getElementById('fitb-next').classList.add('show');
  updateStats();
}

function nextFITB() {
  fitbIndex++;
  renderFITB();
}

// ============================================================
//  INIT
// ============================================================
filteredVerses = [...VERSES];
mcShuffled = shuffle(VERSES);
fitbShuffled = shuffle(VERSES);
updateStats();
renderFlashcard();

// Fix 7: Keyboard navigation
document.addEventListener('keydown', (e) => {
  if (currentMode === 'flashcard') {
    if (e.key === 'ArrowLeft') changeCard(-1);
    else if (e.key === 'ArrowRight' || e.key === 'ArrowDown') changeCard(1);
    else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
  }
});
</script>
