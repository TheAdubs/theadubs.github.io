<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KM DRILL FORGE — Complete Krav Maga</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --card: #1a1a1a;
  --border: #252525;
  --accent: #c8a84b;
  --red: #c8392b;
  --green: #3a6b4a;
  --text: #d0ccc4;
  --muted: #5a5750;
  --tag: #1e261e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh;
  background-image:
    repeating-linear-gradient(0deg, transparent 0px, transparent 39px, rgba(255,255,255,0.013) 39px, rgba(255,255,255,0.013) 40px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 39px, rgba(255,255,255,0.013) 39px, rgba(255,255,255,0.013) 40px);
}

/* HEADER */
header {
  background: var(--surface);
  border-bottom: 2px solid var(--accent);
  padding: 16px 28px;
  display: flex;
  align-items: center;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.9rem;
  letter-spacing: 5px;
  color: var(--accent);
  line-height: 1;
}
.logo em { color: var(--red); font-style: normal; }
.sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 2px;
}
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.stat-pill {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 1px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  color: var(--muted);
}
.stat-pill span { color: var(--accent); }

/* CONTROLS */
.controls {
  padding: 16px 28px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 12px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: #0d0d0d; border-color: var(--accent); font-weight: 700; }
.filter-btn.belt-yellow.active { background: #b8a030; border-color: #b8a030; }
.filter-btn.belt-orange.active { background: #c8621a; border-color: #c8621a; }
.filter-btn.belt-green.active { background: #3a6b2a; border-color: #3a6b2a; color: #d0ccc4; }
.filter-btn.belt-blue.active { background: #1a4a8a; border-color: #1a4a8a; color: #d0ccc4; }
.filter-btn.belt-brown.active { background: #5a3018; border-color: #5a3018; color: #d0ccc4; }

.search-wrap { margin-left: auto; position: relative; }
.search-wrap input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  padding: 7px 32px 7px 12px;
  width: 220px;
  outline: none;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }
.search-clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  color: var(--muted); cursor: pointer; font-size: 0.8rem; display: none;
}

/* GRID */
.grid-wrap { padding: 24px 28px; }
.results-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 16px;
}
.results-label span { color: var(--accent); }

.drill-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap: 18px;
}

/* DRILL CARD */
.drill-card {
  background: var(--card);
  border: 1px solid var(--border);
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}
.drill-card:hover { border-color: rgba(200,168,75,0.4); transform: translateY(-2px); }

.belt-stripe {
  height: 3px;
  width: 100%;
}
.belt-yellow .belt-stripe { background: linear-gradient(90deg, #b8a030, #d4b840); }
.belt-orange .belt-stripe { background: linear-gradient(90deg, #c8621a, #e07830); }
.belt-green .belt-stripe { background: linear-gradient(90deg, #2a5a1a, #3a7a28); }
.belt-blue .belt-stripe { background: linear-gradient(90deg, #1a3a8a, #2a50aa); }
.belt-brown .belt-stripe { background: linear-gradient(90deg, #4a2010, #6a3820); }

.card-head {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.card-meta {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.25rem;
  letter-spacing: 2px;
  color: var(--text);
  line-height: 1.1;
}
.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 8px;
}
.tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 6px;
  background: var(--tag);
  border: 1px solid rgba(58,107,74,0.4);
  color: #6aaa7a;
}
.tag.red { background: rgba(200,57,43,0.1); border-color: rgba(200,57,43,0.3); color: #c87060; }

.dur-box {
  flex-shrink: 0;
  border: 1px solid rgba(200,168,75,0.3);
  padding: 6px 10px;
  text-align: center;
  min-width: 68px;
}
.dur-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 1px;
  display: block;
  margin-bottom: 2px;
}
.dur-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 1px;
  color: var(--accent);
}

.card-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.sec-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.goal-txt {
  font-size: 0.8rem;
  line-height: 1.5;
  color: var(--text);
  font-style: italic;
  opacity: 0.85;
}
.steps { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.steps li { display: flex; gap: 8px; font-size: 0.78rem; line-height: 1.4; }
.sn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.6rem;
  color: var(--accent);
  flex-shrink: 0;
  width: 18px;
  padding-top: 1px;
}

.intensity-row { display: flex; gap: 6px; align-items: center; }
.int-bar {
  flex: 1; height: 5px; background: var(--border); overflow: hidden;
}
.int-fill { height: 100%; background: linear-gradient(90deg, #3a6b4a, var(--accent), var(--red)); }
.int-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem;
  color: var(--muted);
  width: 52px;
  text-align: right;
}

.no-results {
  text-align: center;
  padding: 80px 40px;
  color: var(--muted);
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 2px;
  grid-column: 1/-1;
}

/* ── RANDOM DRILL MODAL ── */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 500;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--card);
  border: 1px solid var(--accent);
  max-width: 580px;
  width: 90%;
  max-height: 88vh;
  overflow-y: auto;
  position: relative;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity:0; transform:scale(0.95) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  position: sticky; top: 0;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 3px;
  color: var(--accent);
}
.modal-close {
  background: transparent; border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-size: 0.8rem;
  padding: 4px 10px; font-family: 'Share Tech Mono', monospace;
  letter-spacing: 1px;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }
.modal-body { padding: 20px; }
.modal-reshuffle {
  width: 100%; margin-top: 16px;
  font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
  letter-spacing: 3px; padding: 12px;
  background: var(--accent); color: #0d0d0d; border: none; cursor: pointer;
  transition: background 0.15s;
}
.modal-reshuffle:hover { background: #d9b75a; }

/* ── SESSION PLANNER DRAWER ── */
.planner-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 400;
  pointer-events: none;
}
.planner-overlay.open { display: block; }
.planner-backdrop {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.6);
  pointer-events: all;
}
.planner-drawer {
  position: absolute; right: 0; top: 0; bottom: 0;
  width: min(600px, 95vw);
  background: var(--surface);
  border-left: 2px solid var(--accent);
  overflow-y: auto;
  pointer-events: all;
  transform: translateX(100%);
  transition: transform 0.3s ease;
}
.planner-overlay.open .planner-drawer { transform: translateX(0); }

.planner-head {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky; top: 0; z-index: 10;
  display: flex; justify-content: space-between; align-items: center;
}
.planner-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem; letter-spacing: 4px; color: var(--accent);
}
.planner-config {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end;
}
.config-group { display: flex; flex-direction: column; gap: 6px; }
.config-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.58rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
}
.config-select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-family: 'Share Tech Mono', monospace;
  font-size: 0.72rem; padding: 7px 10px; outline: none; cursor: pointer;
}
.config-select:focus { border-color: var(--accent); }
.btn-build {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
  letter-spacing: 3px; padding: 10px 22px;
  background: var(--accent); color: #0d0d0d; border: none; cursor: pointer;
  transition: background 0.15s; align-self: flex-end;
}
.btn-build:hover { background: #d9b75a; }

.session-output { padding: 20px 22px; }
.session-empty {
  text-align: center; padding: 60px 20px;
  font-family: 'Share Tech Mono', monospace; font-size: 0.7rem;
  color: var(--muted); letter-spacing: 2px; line-height: 2;
}
.session-header-block {
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 14px 16px;
  margin-bottom: 18px;
}
.session-title-main {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem;
  letter-spacing: 3px; color: var(--accent); margin-bottom: 6px;
}
.session-meta-row {
  display: flex; gap: 16px; flex-wrap: wrap;
}
.session-meta-item {
  font-family: 'Share Tech Mono', monospace; font-size: 0.62rem;
  color: var(--muted); letter-spacing: 1px;
}
.session-meta-item span { color: var(--text); }

.session-phase {
  margin-bottom: 18px;
}
.phase-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.phase-num {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem;
  letter-spacing: 2px; color: var(--accent); line-height: 1;
}
.phase-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
  letter-spacing: 2px; color: var(--text);
}
.phase-time {
  font-family: 'Share Tech Mono', monospace; font-size: 0.6rem;
  color: var(--muted); margin-left: auto; letter-spacing: 1px;
}

.session-drill-row {
  background: var(--card);
  border: 1px solid var(--border);
  padding: 10px 14px;
  margin-bottom: 8px;
  display: flex; gap: 12px; align-items: flex-start;
  border-left: 3px solid var(--border);
  cursor: pointer;
  transition: border-left-color 0.15s;
}
.session-drill-row:hover { border-left-color: var(--accent); }
.session-drill-row.belt-yellow { border-left-color: #b8a030; }
.session-drill-row.belt-orange { border-left-color: #c8621a; }
.session-drill-row.belt-green { border-left-color: #3a7a28; }
.session-drill-row.belt-blue { border-left-color: #2a50aa; }
.session-drill-row.belt-brown { border-left-color: #6a3820; }

.sdr-time {
  font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
  color: var(--accent); letter-spacing: 1px; flex-shrink: 0; min-width: 54px;
}
.sdr-info { flex: 1; }
.sdr-title {
  font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
  letter-spacing: 2px; color: var(--text); line-height: 1.1;
}
.sdr-sub {
  font-family: 'Share Tech Mono', monospace; font-size: 0.58rem;
  color: var(--muted); letter-spacing: 1px; margin-top: 2px;
}
.sdr-int {
  font-family: 'Share Tech Mono', monospace; font-size: 0.58rem;
  flex-shrink: 0;
  padding: 2px 6px; border: 1px solid var(--border);
  color: var(--muted);
}

.btn-print-session {
  width: 100%; margin-top: 16px;
  font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem;
  letter-spacing: 3px; padding: 12px;
  background: transparent; color: var(--accent);
  border: 1px solid var(--accent); cursor: pointer;
  transition: all 0.15s;
}
.btn-print-session:hover { background: var(--accent); color: #0d0d0d; }

/* Print */
@media print {
  header, .controls, .modal-overlay, .planner-overlay { display: none !important; }
  body { background: white; }
  .drill-card { border: 1px solid #ccc; break-inside: avoid; transform: none !important; }
  .card-title { color: #000; }
  .belt-stripe { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">KM <em>DRILL</em> FORGE</div>
    <div class="sub">// COMPLETE KRAV MAGA — LEVINE &amp; WHITMAN // 230+ TECHNIQUES</div>
  </div>
  <div class="header-right">
    <div class="stat-pill">DRILLS: <span id="totalCount">0</span></div>
    <div class="stat-pill">SHOWN: <span id="shownCount">0</span></div>
    <button onclick="openRandom()" style="font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;padding:7px 14px;border:1px solid var(--accent);background:transparent;color:var(--accent);cursor:pointer;">⚡ RANDOM</button>
    <button onclick="openPlanner()" style="font-family:'Bebas Neue',sans-serif;font-size:0.95rem;letter-spacing:2px;padding:7px 14px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;">📋 SESSION PLANNER</button>
    <button onclick="window.print()" style="font-family:'Share Tech Mono',monospace;font-size:0.6rem;letter-spacing:2px;padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;">⎙ PRINT</button>
  </div>
</header>

<div class="controls">
  <div class="filter-group" id="beltFilters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('belt','all',this)">ALL BELTS</button>
    <button class="filter-btn belt-yellow" data-filter="Yellow Belt" onclick="setFilter('belt','Yellow Belt',this)">YELLOW</button>
    <button class="filter-btn belt-orange" data-filter="Orange Belt" onclick="setFilter('belt','Orange Belt',this)">ORANGE</button>
    <button class="filter-btn belt-green" data-filter="Green Belt" onclick="setFilter('belt','Green Belt',this)">GREEN</button>
    <button class="filter-btn belt-blue" data-filter="Blue Belt" onclick="setFilter('belt','Blue Belt',this)">BLUE</button>
    <button class="filter-btn belt-brown" data-filter="Brown Belt" onclick="setFilter('belt','Brown Belt',this)">BROWN</button>
  </div>
  <div class="filter-group" id="catFilters">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('cat','all',this)">ALL TYPES</button>
    <button class="filter-btn" data-filter="Strike" onclick="setFilter('cat','Strike',this)">STRIKES</button>
    <button class="filter-btn" data-filter="Defense" onclick="setFilter('cat','Defense',this)">DEFENSE</button>
    <button class="filter-btn" data-filter="Groundfighting" onclick="setFilter('cat','Groundfighting',this)">GROUND</button>
    <button class="filter-btn" data-filter="Weapon Defense" onclick="setFilter('cat','Weapon Defense',this)">WEAPONS</button>
    <button class="filter-btn" data-filter="Combination" onclick="setFilter('cat','Combination',this)">COMBOS</button>
    <button class="filter-btn" data-filter="Self-Defense" onclick="setFilter('cat','Self-Defense',this)">SELF-DEF</button>
  </div>
  <div class="search-wrap">
    <input type="text" id="searchBox" placeholder="SEARCH DRILLS..." oninput="onSearch(this)">
    <span class="search-clear" id="searchClear" onclick="clearSearch()">✕</span>
  </div>
</div>

<div class="grid-wrap">
  <div class="results-label">SHOWING <span id="shownCount2">0</span> OF <span id="totalCount2">0</span> DRILLS</div>
  <div class="drill-grid" id="drillGrid"></div>
</div>

<!-- RANDOM DRILL MODAL -->
<div class="modal-overlay" id="randomModal" onclick="handleModalClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">⚡ RANDOM DRILL</div>
      <button class="modal-close" onclick="closeRandom()">✕ CLOSE</button>
    </div>
    <div class="modal-body" id="randomBody"></div>
  </div>
</div>

<!-- SESSION PLANNER DRAWER -->
<div class="planner-overlay" id="plannerOverlay">
  <div class="planner-backdrop" onclick="closePlanner()"></div>
  <div class="planner-drawer">
    <div class="planner-head">
      <div class="planner-title">📋 SESSION PLANNER</div>
      <button class="modal-close" onclick="closePlanner()">✕ CLOSE</button>
    </div>
    <div class="planner-config">
      <div class="config-group">
        <div class="config-label">Class Duration</div>
        <select class="config-select" id="planDuration">
          <option value="30">30 minutes</option>
          <option value="45">45 minutes</option>
          <option value="60" selected>60 minutes</option>
          <option value="90">90 minutes</option>
        </select>
      </div>
      <div class="config-group">
        <div class="config-label">Belt Focus</div>
        <select class="config-select" id="planBelt">
          <option value="all">All Levels</option>
          <option value="Yellow Belt">Yellow Belt</option>
          <option value="Orange Belt">Orange Belt</option>
          <option value="Green Belt">Green Belt</option>
          <option value="Blue Belt">Blue Belt</option>
          <option value="Brown Belt">Brown Belt</option>
        </select>
      </div>
      <div class="config-group">
        <div class="config-label">Focus Area</div>
        <select class="config-select" id="planCat">
          <option value="all">Balanced</option>
          <option value="Strike">Strikes</option>
          <option value="Defense">Defense</option>
          <option value="Groundfighting">Groundfighting</option>
          <option value="Weapon Defense">Weapon Defense</option>
          <option value="Combination">Combinations</option>
        </select>
      </div>
      <button class="btn-build" onclick="buildSession()">BUILD SESSION</button>
    </div>
    <div class="session-output" id="sessionOutput">
      <div class="session-empty">Configure your class above and hit<br>BUILD SESSION to generate a plan.</div>
    </div>
  </div>
</div>

<script>
const DRILLS = [
  // ─── YELLOW BELT ──────────────────────────────────────────
  {
    id: 1, belt: "Yellow Belt", category: "Strike",
    title: "Hammer & Jab Flow",
    technique: "Left Straight Punch / Forward Hammerfist",
    goal: "Build punch mechanics and wrist alignment under fatigue. Develop the habit of recoiling fully between strikes.",
    duration: "3 min", intensity: 2, intensityLabel: "Low",
    steps: [

let activeBelt = 'all';

function getFiltered() {
  return DRILLS.filter(d => {
    const beltOk = activeBelt === 'all' || d.belt === activeBelt;
    const catOk = activeCat === 'all' || d.category === activeCat;
    const s = searchTerm.toLowerCase();
    const textOk = !s || d.title.toLowerCase().includes(s) || d.technique.toLowerCase().includes(s) || d.tags.join(' ').toLowerCase().includes(s);
    return beltOk && catOk && textOk;
  });
}

function beltClass(belt) {
  return 'belt-' + belt.split(' ')[0].toLowerCase();
}

function parseDuration(str) {
  // Handles: "3 min", "2 x 90 sec", "3 x 2 min", "2 x 3 min"
  const mxSec = str.match(/(\d+)\s*x\s*(\d+)\s*sec/i);
  if (mxSec) return Math.ceil((parseInt(mxSec[1]) * parseInt(mxSec[2])) / 60);
  const mxMin = str.match(/(\d+)\s*x\s*(\d+)\s*min/i);
  if (mxMin) return parseInt(mxMin[1]) * parseInt(mxMin[2]);
  const mxBare = str.match(/(\d+)\s*x\s*(\d+)(?!\s*s)/i);
  if (mxBare) return Math.ceil((parseInt(mxBare[1]) * parseInt(mxBare[2])) / 60);
  const mins = str.match(/(\d+)\s*min/i);
  if (mins) return parseInt(mins[1]);
  const secs = str.match(/(\d+)\s*sec/i);
  if (secs) return Math.ceil(parseInt(secs[1]) / 60);
  return 4;
}

function buildSession() {
  const totalMin = parseInt(document.getElementById('planDuration').value);
  const beltFocus = document.getElementById('planBelt').value;
  const catFocus = document.getElementById('planCat').value;

  // Reserve time for warmup/cooldown blocks
  const warmupMin = totalMin >= 60 ? 10 : 5;
  const cooldownMin = totalMin >= 60 ? 8 : 5;
  const drillTime = totalMin - warmupMin - cooldownMin;

  // Filter drill pool
  let pool = DRILLS.filter(d => {
    const bOk = beltFocus === 'all' || d.belt === beltFocus;
    const cOk = catFocus === 'all' || d.category === catFocus;
    return bOk && cOk;
  });
  if (pool.length < 3) pool = DRILLS; // fallback to all

  // Shuffle pool
  const shuffled = [...pool].sort(() => Math.random() - 0.5);

  // Smart sequencing: build phases based on category priority
  const phaseOrder = catFocus === 'all'
    ? ['Strike', 'Defense', 'Self-Defense', 'Combination', 'Groundfighting', 'Weapon Defense']
    : [catFocus, 'Combination', 'Strike', 'Defense', 'Self-Defense', 'Groundfighting', 'Weapon Defense'];

  // Pick drills greedily to fill time, one per category first, then fill
  const chosen = [];
  let usedIds = new Set();
  let timeLeft = drillTime;

  // First pass: one from each category
  for (const cat of phaseOrder) {
    if (timeLeft <= 0) break;
    const pick = shuffled.find(d => d.category === cat && !usedIds.has(d.id));
    if (pick) {
      const dur = parseDuration(pick.duration);
      if (dur <= timeLeft + 2) {
        chosen.push(pick);
        usedIds.add(pick.id);
        timeLeft -= dur;
      }
    }
  }

  // Second pass: fill remaining time
  for (const d of shuffled) {
    if (timeLeft <= 1) break;
    if (usedIds.has(d.id)) continue;
    const dur = parseDuration(d.duration);
    if (dur <= timeLeft + 1) {
      chosen.push(d);
      usedIds.add(d.id);
      timeLeft -= dur;
    }
  }

  // Sort by intensity (low → high → stress)
  chosen.sort((a, b) => a.intensity - b.intensity);

  // Build phases
  const phases = [
    { name: 'WARM-UP', time: warmupMin, drills: [], note: 'Joint mobility, light shadowboxing, footwork patterns, stance review.' },
  ];

  // Split drills into phases by intensity
  const techDrills = chosen.filter(d => d.intensity <= 2);
  const midDrills = chosen.filter(d => d.intensity === 3);
  const highDrills = chosen.filter(d => d.intensity >= 4);

  if (techDrills.length) phases.push({ name: 'TECHNIQUE', drills: techDrills });
  if (midDrills.length) phases.push({ name: 'DRILLING', drills: midDrills });
  if (highDrills.length) phases.push({ name: 'PRESSURE TRAINING', drills: highDrills });
  phases.push({ name: 'COOL-DOWN', time: cooldownMin, drills: [], note: 'Light stretching, breathing reset, debrief of key corrections from today\'s session.' });

  // Assign phase times from drill durations
  phases.forEach(p => {
    if (!p.time) {
      p.time = p.drills.reduce((sum, d) => sum + parseDuration(d.duration), 0);
    }
  });

  // Build running clock
  let clock = 0;
  const formatTime = min => `${String(Math.floor(min)).padStart(2,'0')}:00`;

  let html = `
    <div class="session-header-block">
      <div class="session-title-main">CLASS SESSION PLAN</div>
      <div class="session-meta-row">
        <div class="session-meta-item">DURATION: <span>${totalMin} MIN</span></div>
        <div class="session-meta-item">BELT: <span>${beltFocus === 'all' ? 'ALL LEVELS' : beltFocus.toUpperCase()}</span></div>
        <div class="session-meta-item">FOCUS: <span>${catFocus === 'all' ? 'BALANCED' : catFocus.toUpperCase()}</span></div>
        <div class="session-meta-item">DRILLS: <span>${chosen.length}</span></div>
      </div>
    </div>
  `;

  phases.forEach((phase, pi) => {
    const startStr = formatTime(clock);
    clock += phase.time;
    const endStr = formatTime(clock);

    html += `
      <div class="session-phase">
        <div class="phase-header">
          <div class="phase-num">${String(pi + 1).padStart(2,'0')}</div>
          <div class="phase-name">${phase.name}</div>
          <div class="phase-time">${startStr} → ${endStr} (${phase.time} MIN)</div>
        </div>
    `;

    if (phase.note) {
      html += `<div style="font-size:0.8rem;color:var(--muted);font-style:italic;padding:8px 0 4px;">${phase.note}</div>`;
    }

    if (phase.drills.length) {
      let phaseClk = clock - phase.time;
      phase.drills.forEach(d => {
        const dur = parseDuration(d.duration);
        html += `
          <div class="session-drill-row ${beltClass(d.belt)}" onclick="showDrillInModal(${d.id})" title="Click to view full drill">
            <div class="sdr-time">${formatTime(phaseClk)}</div>
            <div class="sdr-info">
              <div class="sdr-title">${d.title}</div>
              <div class="sdr-sub">${d.technique} · ${d.belt}</div>
            </div>
            <div class="sdr-int">${d.duration}</div>
          </div>
        `;
        phaseClk += dur;
      });
    }

    html += `</div>`;
  });

  html += `<button class="btn-print-session" onclick="printSession()">⎙ PRINT SESSION PLAN</button>`;
  document.getElementById('sessionOutput').innerHTML = html;
}

function showDrillInModal(id) {

      .sdr-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 1px; }
      .sdr-sub { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: #888; }
