      if (d===0) return "today"; if (d===1) return "yesterday";
      if (d<7) return `${d}d ago`; if (d<35) return `${Math.floor(d/7)}w ago`;

    function useMobile() {
      const [m, setM] = useState(window.innerWidth < 640);
      useEffect(() => {
        const handler = () => setM(window.innerWidth < 640);
        window.addEventListener("resize", handler);
        return () => window.removeEventListener("resize", handler);
      }, []);
      return m;
    }

    function KMUTracker() {
      const m = useMobile();
      const [ratings,setRatings] = useState(()=>loadRatings());
      const [checked,setChecked] = useState(()=>loadChecked());
      const [userBelt,setUserBelt] = useState(()=>loadUserBelt());
      const [sessionLog,setSessionLog] = useState(()=>loadLog());
      const [view,setView] = useState(()=>{
        const session = loadDrillSession();
        return session && session.techniques && session.techniques.length > 0 ? "drill" : "dashboard";
      });
      const [drillSession,setDrillSession] = useState(()=>loadDrillSession());
      const [filterBelt,setFilterBelt] = useState("All");
      const [searchQuery,setSearchQuery] = useState("");
      const [expandedLevel,setExpandedLevel] = useState(null);
      const [expandedCat,setExpandedCat] = useState(null);
      const [showReset,setShowReset] = useState(false);
      const [showWelcome,setShowWelcome] = useState(()=>!loadWelcomeSeen());
      const [showFullProgress,setShowFullProgress] = useState(false);
      const [showWeakAreas,setShowWeakAreas] = useState(false);
      const [showImport,setShowImport] = useState(false);
      const [showExportMenu,setShowExportMenu] = useState(false);
      const [showBatchTrained,setShowBatchTrained] = useState(false);
      const [recentlyRated,setRecentlyRated] = useState([]);
      const [lastRating,setLastRating] = useState(null); // {key, oldValue, newValue, timestamp}
      const [saveStatus,setSaveStatus] = useState("");
      const [logEntry,setLogEntry] = useState("");
      const [noteOpen,setNoteOpen] = useState(null);

      const flash = (msg)=>{ setSaveStatus(msg); setTimeout(()=>setSaveStatus(""),1800); };

      const setRating = useCallback((key,val)=>{
        setRatings(prev => {
          const ex=prev[key]||{rating:0,note:"",updatedAt:null,trainedAt:null};
          const oldValue = ex.rating;
          const next={...prev,[key]:{...ex,rating:val,updatedAt:Date.now()}};
          saveRatings(next);
          
          // Track for undo
          setLastRating({key, oldValue, newValue: val, timestamp: Date.now()});
          
          return next;
        });
        // Track for batch trained
        setRecentlyRated(prev => {
          const updated = [...prev.filter(k => k !== key), key];
          return updated.slice(-20); // Keep last 20
        });
        flash("Saved");
      },[]);

      const handleUndo = useCallback(()=>{
        if(!lastRating) return;
        const {key, oldValue} = lastRating;
        setRatings(prev => {
          const ex=prev[key]||{rating:0,note:"",updatedAt:null,trainedAt:null};
          const next={...prev,[key]:{...ex,rating:oldValue,updatedAt:Date.now()}};
          saveRatings(next);
          return next;
        });
        setLastRating(null);
        flash("Undone");
      },[lastRating]);

      const handleBatchTrained = useCallback((keys)=>{
        setRatings(prev => {
          const next = {...prev};
          keys.forEach(key => {
            const ex=next[key]||{rating:0,note:"",updatedAt:null,trainedAt:null};
            next[key] = {...ex, trainedAt:Date.now()};
          });
          saveRatings(next);
          return next;
        });
        setRecentlyRated([]);
        setShowBatchTrained(false);
        flash(`Marked ${keys.length} technique${keys.length !== 1 ? 's' : ''} as trained`);
      },[]);

      const startDrillSession = useCallback(()=>{
        const allWeak = [...weakCurrent, ...weakPrev];
        if(allWeak.length === 0) {
          alert("No weak areas to drill! All techniques rated 4-5.");
          return;
        }
        
        // Check if there's an existing session in progress
        const existing = loadDrillSession();
        if(existing && existing.techniques && existing.techniques.length > 0) {
          const resume = confirm(`You have a drill session in progress (${existing.current + 1}/${existing.techniques.length}). Resume where you left off?`);
          if(resume) {
            setDrillSession(existing);
            setView("drill");
            return;
          }
        }
        
        setDrillSession({techniques: allWeak, current: 0});
        setView("drill");
      },[weakCurrent, weakPrev]);

      const setNote = useCallback((key,note)=>{
        setRatings(prev => {
          const ex=prev[key]||{rating:0,note:"",updatedAt:null,trainedAt:null};
          const next={...prev,[key]:{...ex,note,updatedAt:Date.now()}};
          saveRatings(next);
          return next;
        });
        flash("Note saved");
      },[]);

      const toggleChecked = useCallback((key)=>{
        setChecked(prev=>{
          const next={...prev,[key]:!prev[key]};
          saveChecked(next);
          return next;
        });
      },[]);

      const handleBeltChange = (belt,sub)=>{ const info={belt,sub}; setUserBelt(info); saveUserBelt(info); };

      const handleReset = ()=>{ setRatings({}); setChecked({}); setSessionLog([]); setSnapshots([]); saveRatings({}); saveChecked({}); saveLog([]); saveSnapshots([]); try{localStorage.removeItem("kmu_welcome_seen");}catch(e){} setShowWelcome(true); setShowReset(false); flash("Progress cleared"); };

      const handleExport = ()=>{
        const data = {
          version: "1.0",
          exportDate: new Date().toISOString(),
          userBelt,
          ratings,
          checked,
          sessionLog
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `kmu-tracker-backup-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        flash("Backup downloaded");
      };

      const handleExportCSV = ()=>{
        const rows = [
          ["Technique", "Category", "Belt Level", "Chapter", "Rating", "Confidence Label", "Last Rated", "Last Trained", "Notes"]
        ];
        
        CURRICULUM.forEach(level => {
          level.categories.forEach(cat => {
            if(isTMK(cat.name)) {
              // TMK items as checked/unchecked
              cat.items.forEach(item => {
                const k = makeKey(level.chapter, cat.name, item);
                const isChecked = checked[k] ? "Studied" : "Not Studied";
                rows.push([
                  item,
                  cat.name,
                  `${level.belt} ${level.sub}`,
                  level.chapter,
                  isChecked,
                  "",
                  "",
                  "",
                  ""
                ]);
              });
            } else {
              // Standard techniques
              cat.items.forEach(item => {
                const k = makeKey(level.chapter, cat.name, item);
                const r = getRating(k);
                const note = getNote(k);
                const updatedAt = getUpdatedAt(k);
                const trainedAt = getTrainedAt(k);
                const confidenceLabel = r > 0 ? CONFIDENCE_LABELS[r] : "";
                const lastRated = updatedAt ? timeAgo(updatedAt) : "";
                const lastTrained = trainedAt ? timeAgo(trainedAt) : "";
                
                rows.push([
                  item,
                  cat.name,
                  `${level.belt} ${level.sub}`,
                  level.chapter,
                  r || "",
                  confidenceLabel,
                  lastRated,
                  lastTrained,
                  note
                ]);
              });
            }
          });
        });
        
        const csv = rows.map(row => 
          row.map(cell => {
            const str = String(cell || "");
            // Escape quotes and wrap in quotes if contains comma, quote, or newline
            if(str.includes(',') || str.includes('"') || str.includes('\n')) {
              return '"' + str.replace(/"/g, '""') + '"';
            }
            return str;
          }).join(',')
        ).join('\n');
        
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `kmu-progress-${new Date().toISOString().split('T')[0]}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        flash("Spreadsheet downloaded");
      };

      const handleImport = (e)=>{
        const file = e.target.files?.[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (evt)=>{
          try {
            const data = JSON.parse(evt.target.result);
            if(data.ratings) { setRatings(data.ratings); saveRatings(data.ratings); }
            if(data.checked) { setChecked(data.checked); saveChecked(data.checked); }
            if(data.sessionLog) { setSessionLog(data.sessionLog); saveLog(data.sessionLog); }
            if(data.userBelt) { setUserBelt(data.userBelt); saveUserBelt(data.userBelt); }
            setShowImport(false);
            flash("Backup restored");
          } catch(err) {
            alert("Invalid backup file. Please select a valid KMU Tracker backup.");
          }
        };
        reader.readAsText(file);
      };

      const addLogEntry = ()=>{
        if(!logEntry.trim()) return;
        const entry={text:logEntry.trim(),date:Date.now()};
        const next=[entry,...sessionLog].slice(0,100);
        setSessionLog(next); saveLog(next); setLogEntry(""); flash("Entry saved");
      };

      const deleteLogEntry = (idx)=>{ const next=sessionLog.filter((_,i)=>i!==idx); setSessionLog(next); saveLog(next); flash("Entry deleted"); };

      const getRating = (key)=>{ const v=ratings[key]; if(!v)return 0; return typeof v==="number"?v:v.rating; };
      const getNote = (key)=>{ const v=ratings[key]; if(!v||typeof v==="number")return ""; return v.note||""; };
      const getUpdatedAt = (key)=>{ const v=ratings[key]; if(!v||typeof v==="number")return null; return v.updatedAt||null; };
      const getTrainedAt = (key)=>{ const v=ratings[key]; if(!v||typeof v==="number")return null; return v.trainedAt||null; };
      const getCurrentLevel = ()=> CURRICULUM.find(l=>l.belt===userBelt.belt&&l.sub===userBelt.sub);

      const markTrained = useCallback((key)=>{
        setRatings(prev => {
          const ex=prev[key]||{rating:0,note:"",updatedAt:null,trainedAt:null};
          const next={...prev,[key]:{...ex,trainedAt:Date.now()}};
          saveRatings(next);
          return next;
        });
        flash("Marked as trained");
      },[]);

      const getLevelReadiness = (level)=>{
        let total=0,rated=0,sum=0;
        level.categories.forEach(cat=>{ if(isTMK(cat.name))return; cat.items.forEach(item=>{ const r=getRating(makeKey(level.chapter,cat.name,item)); total++; if(r>0){rated++;sum+=r;} }); });
        return{total,rated,pct:total>0?Math.round((sum/(total*5))*100):0};
      };

      const getWeakItems = (level)=>{
        const weak=[];
        level.categories.forEach(cat=>{ if(isTMK(cat.name))return; cat.items.forEach(item=>{ const k=makeKey(level.chapter,cat.name,item); const r=getRating(k); if(r<=3)weak.push({cat:cat.name,item,rating:r,key:k}); }); });
        return weak.sort((a,b)=>a.rating-b.rating);
      };

      const getPrevLevelsWeak = ()=>{
        const curIdx=CURRICULUM.findIndex(l=>l.belt===userBelt.belt&&l.sub===userBelt.sub);
        if(curIdx<=0) return[];
        const weak=[];
        for(let i=0;i<curIdx;i++){
          const level=CURRICULUM[i];
          level.categories.forEach(cat=>{ if(isTMK(cat.name))return; cat.items.forEach(item=>{ const k=makeKey(level.chapter,cat.name,item); const r=getRating(k); if(r<=3)weak.push({level:`${level.belt} · ${level.label}`,cat:cat.name,item,rating:r,key:k}); }); });
        }
        return weak.sort((a,b)=>a.rating-b.rating).slice(0,25);
      };

      const getReadinessSummary = (level)=>{
        const curIdx=CURRICULUM.findIndex(l=>l.belt===level.belt&&l.sub===level.sub);
        let cT=0,cS=0,cW=0,cU=0,pT=0,pS=0,pW=0,pU=0,stale=0;
        const tally=(l,cur)=>{ l.categories.forEach(cat=>{ if(isTMK(cat.name))return; cat.items.forEach(item=>{ const k=makeKey(l.chapter,cat.name,item); const r=getRating(k); const ts=getUpdatedAt(k); if(cur){cT++;if(r===0)cU++;else if(r<=3)cW++;else cS++;}else{pT++;if(r===0)pU++;else if(r<=3)pW++;else pS++;} if(isStale(ts))stale++; }); }); };
        tally(level,true);
        for(let i=0;i<curIdx;i++) tally(CURRICULUM[i],false);
        const totalWeak=cW+cU+pW+pU, totalTech=cT+pT, totalStrong=cS+pS;
        const pct=totalTech>0?Math.round((totalStrong/totalTech)*100):0;
        let verdict,vc;
        if(pct>=90&&totalWeak===0){verdict="READY TO TEST";vc="#10b981";}
        else if(pct>=75&&cU===0){verdict="NEARLY READY — address weak areas";vc="#22c55e";}
        else if(pct>=50){verdict="IN PROGRESS — significant gaps remain";vc="#eab308";}
        else{verdict="NOT READY — keep training";vc="#ef4444";}
        return{cT,cS,cW,cU,pT,pS,pW,pU,stale,totalWeak,pct,verdict,vc};
      };

      const currentLevel=getCurrentLevel();
      const currentReadiness=currentLevel?getLevelReadiness(currentLevel):null;
      const weakCurrent=currentLevel?getWeakItems(currentLevel):[];
      const weakPrev=getPrevLevelsWeak();
      const summary=currentLevel?getReadinessSummary(currentLevel):null;
      const bc=currentLevel?BELT_COLORS[currentLevel.belt]:BELT_COLORS.Blue;
      
      const [snapshots,setSnapshots] = useState(()=>loadSnapshots());
      
      // Auto-save progress snapshot weekly
      useEffect(()=>{
        if(!summary) return;
        const now = Date.now();
        const weekMs = 7*24*60*60*1000;
        const lastSnapshot = snapshots[snapshots.length-1];
        if(!lastSnapshot || now - lastSnapshot.date > weekMs) {
          const newSnapshot = {date:now, pct:summary.pct, belt:`${currentLevel.belt} ${currentLevel.sub}`};
          const updated = [...snapshots, newSnapshot].slice(-12); // Keep last 12 weeks
          setSnapshots(updated);
          saveSnapshots(updated);
          
          // Show progress update
          if(lastSnapshot) {
            const change = summary.pct - lastSnapshot.pct;
            const arrow = change > 0 ? '📈' : change < 0 ? '📉' : '➡️';
            const changeText = change !== 0 ? ` (${change > 0 ? '+' : ''}${change}%)` : '';
            flash(`Weekly snapshot saved: ${summary.pct}%${changeText} ${arrow}`);
          } else {
            flash(`First progress snapshot saved: ${summary.pct}% 📊`);
          }
        }
      },[summary?.pct]);

      // Close export menu when clicking outside
      useEffect(()=>{
        if(!showExportMenu) return;
        const handler = (e)=>{
          if(!e.target.closest('button')) setShowExportMenu(false);
        };
        document.addEventListener('click',handler);
        return ()=>document.removeEventListener('click',handler);
      },[showExportMenu]);

      // Auto-show batch trained prompt
      useEffect(()=>{
        if(recentlyRated.length >= 5 && !showBatchTrained) {
          const timer = setTimeout(()=> setShowBatchTrained(true), 1000);
          return ()=> clearTimeout(timer);
        }
      },[recentlyRated.length, showBatchTrained]);

      // Save drill session to localStorage
      useEffect(()=>{
        saveDrillSession(drillSession);
      },[drillSession]);

      const handlePrint = ()=>{
        try {
          if(!currentLevel) {
            alert("Please select your belt level first");
            return;
          }
          
          const urgent = []; // 0-2
          const polish = []; // 3
          
          // Current level weak
          weakCurrent.forEach(w => {
            if(w.rating <= 2) urgent.push({...w, level: "Current"});
            else if(w.rating === 3) polish.push({...w, level: "Current"});
          });
          
          // Previous levels weak
          weakPrev.forEach(w => {
            if(w.rating <= 2) urgent.push(w);
            else if(w.rating === 3) polish.push(w);
          });

          const getLabel = (r) => {
            const labels = ["","Never Practiced","Know Conceptually","Can Do Fresh","Solid Under Pressure","Test Ready"];
            return labels[r] || "";
          };

          const html = `
            <!DOCTYPE html>
            <html>
            <head>
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>KMU Drill Checklist - ${currentLevel.belt} ${currentLevel.label}</title>
              <style>
                body { font-family: 'Courier New', monospace; padding: 40px 20px; max-width: 800px; margin: 0 auto; background: #fff; }
                h1 { font-size: 24px; margin-bottom: 5px; color: #000; }
                .subtitle { color: #666; font-size: 14px; margin-bottom: 30px; }
                .section { margin-bottom: 30px; page-break-inside: avoid; }
                .section-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid #000; }
                .urgent .section-title { color: #ef4444; }
                .polish .section-title { color: #eab308; }
                .item { display: flex; gap: 10px; margin-bottom: 10px; font-size: 13px; line-height: 1.5; }
                .checkbox { width: 16px; height: 16px; border: 2px solid #000; flex-shrink: 0; margin-top: 2px; background: #fff; }
                .item-text { flex: 1; }
                .notes { margin-top: 40px; padding-top: 20px; border-top: 1px solid #ccc; page-break-inside: avoid; }
                .notes-title { font-weight: bold; margin-bottom: 10px; }
                .notes-lines { border: 1px solid #ccc; min-height: 200px; padding: 10px; background: #fff; }
                @media print { 
                  body { padding: 20px; } 
                  .section { page-break-inside: avoid; }
                }
                @media (max-width: 640px) {
                  body { padding: 20px 15px; }
                  h1 { font-size: 20px; }
                  .section-title { font-size: 14px; }
                  .item { font-size: 12px; }
                }
              </style>
            </head>
            <body>
              <h1>DRILL CHECKLIST — ${currentLevel.belt} ${currentLevel.label}</h1>
              <div class="subtitle">Generated: ${new Date().toLocaleDateString('en-US', {month: 'long', day: 'numeric', year: 'numeric'})}</div>
              
              ${urgent.length > 0 ? `
                <div class="section urgent">
                  <div class="section-title">⚠ PRIORITY — Unrated or Low Confidence (${urgent.length} items)</div>
                  ${urgent.map(w => `
                    <div class="item">
                      <div class="checkbox"></div>
                      <div class="item-text">
                        <strong>${w.item}</strong> — 
                        ${w.rating === 0 ? 'UNRATED' : `Rating: ${w.rating} (${getLabel(w.rating)})`}
                        ${w.level !== 'Current' ? ` — ${w.level}` : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
              
              ${polish.length > 0 ? `
                <div class="section polish">
                  <div class="section-title">⚡ POLISH — Needs Pressure (${polish.length} items)</div>
                  ${polish.map(w => `
                    <div class="item">
                      <div class="checkbox"></div>
                      <div class="item-text">
                        <strong>${w.item}</strong> — 
                        Rating: 3 (Can Do Fresh)
                        ${w.level !== 'Current' ? ` — ${w.level}` : ''}
                      </div>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
              
              ${urgent.length === 0 && polish.length === 0 ? `
                <div class="section">
                  <div class="section-title">✓ NO WEAK AREAS</div>
                  <p>All techniques rated 4-5. You're ready to test!</p>
                </div>
              ` : ''}
              
              <div class="notes">
                <div class="notes-title">NOTES FROM DRILLING:</div>
                <div class="notes-lines"></div>
              </div>
            </body>
            </html>
          `;
          
          // Open in new tab
          const newWindow = window.open('', '_blank');
          if(!newWindow) {
            alert("Please allow popups to view the drill sheet");
            return;
          }
          newWindow.document.write(html);
          newWindow.document.close();
          flash("Drill sheet opened in new tab");
          
        } catch(error) {
          console.error("Print error:", error);
          alert("Failed to generate drill sheet: " + error.message);
        }
      };

      return (
        <div style={{background:"#0d0d0d",minHeight:"100vh",fontFamily:"'Courier New',monospace",color:"#e0e0e0"}}>

          {/* HEADER */}
          <div style={{background:"#111",borderBottom:"2px solid #FFD700",padding:m?"12px 14px":"14px 20px",display:"flex",flexDirection:m?"column":"row",alignItems:m?"flex-start":"center",justifyContent:"space-between",gap:10}}>
            <div>
              <div style={{fontSize:m?17:20,fontWeight:900,color:"#FFD700",letterSpacing:3}}>KMU TRACKER</div>
              <div style={{fontSize:9,color:"#ccc",letterSpacing:2}}>Krav Maga Worldwide · <span style={{color:"#bbb",fontStyle:"italic"}}>so one may walk in peace</span></div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,width:m?"100%":"auto"}}>
              {saveStatus&&(
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:10,color:"#22c55e",letterSpacing:2}}>{saveStatus}</span>
                  {saveStatus==="Saved"&&lastRating&&Date.now()-lastRating.timestamp<5000&&(
                    <button onClick={handleUndo} style={{background:"transparent",border:"1px solid #22c55e44",color:"#22c55e",padding:"2px 8px",fontSize:9,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>
                      UNDO
                    </button>
                  )}
                </div>
              )}
              <div style={{position:"relative"}}>
                <button onClick={()=>setShowExportMenu(!showExportMenu)}
                  style={{background:"transparent",border:"1px solid #2a2a2a",color:"#FFD700",padding:m?"8px 12px":"5px 10px",fontSize:m?12:10,cursor:"pointer",fontFamily:"inherit",letterSpacing:1,whiteSpace:"nowrap",marginLeft:m?0:8,display:"flex",alignItems:"center",gap:4}}>
                  📥 EXPORT {showExportMenu?"▲":"▼"}
                </button>
                {showExportMenu&&(
                  <div style={{position:"absolute",top:"100%",left:0,marginTop:4,background:"#111",border:"1px solid #2a2a2a",minWidth:200,zIndex:50,boxShadow:"0 4px 12px #00000066"}}>
                    <button onClick={()=>{handleExport();setShowExportMenu(false);}} style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid #1a1a1a",color:"#22c55e",padding:"10px 14px",fontSize:10,cursor:"pointer",fontFamily:"inherit",letterSpacing:1,textAlign:"left",display:"block"}}>
                      BACKUP (JSON)
                    </button>
                    <button onClick={()=>{handleExportCSV();setShowExportMenu(false);}} style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid #1a1a1a",color:"#FFD700",padding:"10px 14px",fontSize:10,cursor:"pointer",fontFamily:"inherit",letterSpacing:1,textAlign:"left",display:"block"}}>
                      SPREADSHEET (CSV)
                    </button>
                    <button onClick={()=>{handlePrint();setShowExportMenu(false);}} style={{width:"100%",background:"transparent",border:"none",color:"#FFD700",padding:"10px 14px",fontSize:10,cursor:"pointer",fontFamily:"inherit",letterSpacing:1,textAlign:"left",display:"block"}}>
                      DRILL SHEET (HTML)
                    </button>
                  </div>
                )}
              </div>
              <button onClick={()=>setShowImport(true)}
                style={{background:"transparent",border:"1px solid #2a2a2a",color:"#22c55e",padding:m?"8px 12px":"5px 10px",fontSize:m?12:10,cursor:"pointer",fontFamily:"inherit",letterSpacing:1,whiteSpace:"nowrap"}}>📤 RESTORE</button>
              <button onClick={()=>setShowReset(true)}
                style={{background:"transparent",border:"1px solid #2a2a2a",color:"#444",padding:m?"8px 12px":"5px 10px",fontSize:m?12:10,cursor:"pointer",fontFamily:"inherit",letterSpacing:1,whiteSpace:"nowrap",borderLeft:m?"1px solid #2a2a2a":"1px solid #333"}}>RESET</button>
            </div>
          </div>

          {/* NAV */}
          <div style={{background:"#111",borderBottom:"1px solid #1a1a1a",display:"flex"}}>
            {[
              ["dashboard","DASHBOARD","your readiness"],
              ["testprep","MY NEXT BELT","prepare for test"],
              ["curriculum","ALL BELTS","rate any level"],
              ["progress","PROGRESS","track improvement"],
            ].map(([v,label,sub])=>(
              <button key={v} onClick={()=>setView(v)}

            <div style={{position:"fixed",inset:0,background:"#000000ee",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}}>
              <div style={{background:"#111",border:"2px solid #FFD700",padding:m?20:28,maxWidth:420,width:"100%",boxShadow:"0 0 40px #FFD70033"}}>
                <div style={{fontSize:m?18:22,fontWeight:900,color:"#FFD700",letterSpacing:3,marginBottom:4}}>KMU TRACKER</div>
                <div style={{fontSize:9,color:"#ccc",letterSpacing:2,marginBottom:20}}>Krav Maga Worldwide · <span style={{fontStyle:"italic",color:"#bbb"}}>so one may walk in peace</span></div>
                <div style={{fontSize:m?12:13,color:"#ddd",lineHeight:1.9,marginBottom:20}}>
                  This tool helps you prepare for your belt test by tracking your confidence on every technique in the curriculum.
                </div>
                <div style={{display:"grid",gap:10,marginBottom:24}}>
                  {[
                    ["1","Browse all belt levels","Use ALL BELTS to see the full curriculum and explore what's ahead."],
                    ["2","Rate your techniques","Go to MY NEXT BELT and score each technique 1–5."],
                    ["3","Track your readiness","Return to DASHBOARD to see where you stand."],
                  ].map(([n,title,desc])=>(
                    <div key={n} style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                      <div style={{width:20,height:20,background:"#FFD700",color:"#111",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,flexShrink:0,marginTop:1}}>{n}</div>
                      <div>
                        <div style={{fontSize:m?12:12,fontWeight:700,color:"#ddd",letterSpacing:1}}>{title}</div>
                        <div style={{fontSize:m?11:11,color:"#bbb",marginTop:2}}>{desc}</div>
                      </div>
                    </div>
                  ))}
                </div>
                <button onClick={()=>{saveWelcomeSeen();setShowWelcome(false);setView("testprep");}}
                  style={{width:"100%",background:"#FFD700",border:"none",color:"#111",padding:m?"12px":"11px",fontSize:m?13:12,cursor:"pointer",fontFamily:"inherit",fontWeight:900,letterSpacing:2}}>
                  LET'S GO → START RATING
                </button>
                <button onClick={()=>{saveWelcomeSeen();setShowWelcome(false);}}
                  style={{width:"100%",background:"transparent",border:"none",color:"#444",padding:"8px",fontSize:10,cursor:"pointer",fontFamily:"inherit",marginTop:6,letterSpacing:1}}>
                  I know what I'm doing — skip
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function SCard({label,value,sub,color}){
      return(
        <div style={{background:"#0d0d0d",padding:"10px 12px",borderLeft:`3px solid ${color}`}}>
          <div style={{fontSize:8,color:"#ccc",letterSpacing:2,marginBottom:3}}>{label}</div>
          <div style={{fontSize:14,fontWeight:900,color,marginBottom:sub?2:0}}>{value}</div>
          {sub&&<div style={{fontSize:8,color:"#bbb"}}>{sub}</div>}
        </div>
      );
    }

    function WeakRow({item,cat,subLabel,rating,updatedAt}){
      const color=rating>0?CONFIDENCE_COLORS[rating]:"#444";
      const label=rating>0?CONFIDENCE_LABELS[rating]:"UNRATED";
      return(
        <div style={{display:"flex",alignItems:"center",gap:8,padding:"6px 10px",background:"#0d0d0d",borderLeft:`3px solid ${color}`}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"#ccc"}}>{item}</div>
            <div style={{fontSize:9,color:"#ccc"}}>{subLabel?`${subLabel} · `:""}{cat}{updatedAt?` · ${timeAgo(updatedAt)}`:""}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5,flexShrink:0}}>
            <div style={{width:18,height:18,background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:900,color:rating>0?"#000":"#888"}}>{rating>0?rating:"–"}</div>
            <span style={{fontSize:8,color,minWidth:90,letterSpacing:1}}>{label.toUpperCase()}</span>
          </div>
        </div>
      );
    }

    function NoteEditor({value,onSave,onClose,m=false}){
      const[text,setText]=useState(value||"");
      const ref=useRef(null);
      useEffect(()=>{ if(!m) ref.current?.focus(); },[m]);
      return(
        <div style={{padding:m?"10px 14px 14px":"8px 14px 12px",background:"#090909",borderTop:"1px solid #141414"}}>
          <div style={{fontSize:m?11:8,color:"#FFD700",letterSpacing:2,marginBottom:6}}>✎ TECHNIQUE NOTE</div>
          <textarea ref={ref} value={text} onChange={e=>setText(e.target.value)}
            placeholder="e.g. Remember to pivot fully · keep elbow tight · weight forward on finish · instructor correction..."
            rows={m?4:3} style={{width:"100%",background:"#111",border:"1px solid #222",color:"#ddd",padding:"8px 10px",fontSize:m?16:10,fontFamily:"inherit",resize:"vertical",outline:"none",boxSizing:"border-box"}}/>
          <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
            <button onClick={()=>onSave(text)} style={{background:"#FFD700",border:"none",color:"#111",padding:m?"10px 18px":"5px 12px",fontSize:m?13:9,cursor:"pointer",fontFamily:"inherit",fontWeight:900,letterSpacing:1}}>SAVE NOTE</button>
            <button onClick={onClose} style={{background:"transparent",border:"1px solid #222",color:"#444",padding:m?"10px 14px":"5px 10px",fontSize:m?13:9,cursor:"pointer",fontFamily:"inherit"}}>CANCEL</button>
            {value&&<button onClick={()=>{setText("");onSave("");}} style={{background:"transparent",border:"1px solid #222",color:"#ccc",padding:m?"10px 14px":"5px 10px",fontSize:m?13:9,cursor:"pointer",fontFamily:"inherit",marginLeft:"auto"}}>CLEAR</button>}
          </div>
        </div>
      );
    }

    function ConfidenceBar({value,onChange,compact=false,m=false}){
      const sz = m ? 38 : compact ? 15 : 25;
      const fs = m ? 13 : compact ? 8 : 10;
      return(
        <div style={{display:"flex",gap:m?4:compact?3:4,alignItems:"center"}}>
          {[1,2,3,4,5].map(n=>(
            <button key={n} onClick={()=>onChange(value===n?0:n)} title={CONFIDENCE_LABELS[n]}
              style={{width:sz,height:sz,background:value>=n?CONFIDENCE_COLORS[n]:"#1a1a1a",border:`1px solid ${value>=n?CONFIDENCE_COLORS[n]:"#222"}`,cursor:"pointer",borderRadius:0,padding:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:fs,fontWeight:900,color:value>=n?"#000":"#555",fontFamily:"'Courier New',monospace",transition:"all 0.1s",flexShrink:0}}>
              {n}
            </button>
          ))}
          {!compact&&!m&&value>0&&<span style={{fontSize:8,color:CONFIDENCE_COLORS[value],marginLeft:5,letterSpacing:1,minWidth:100}}>{CONFIDENCE_LABELS[value].toUpperCase()}</span>}
          {m&&value>0&&<span style={{fontSize:11,color:CONFIDENCE_COLORS[value],marginLeft:6,letterSpacing:1}}>{CONFIDENCE_LABELS[value].toUpperCase()}</span>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<KMUTracker />);
  </script>
</body>
</html>
